<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HORMUZ RUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ═══ GEOGRAPHY ═══════════════════════════════════════════════════════════════
// World units: 0 (Persian Gulf) → 7000 (Gulf of Oman)
const WORLD_W = 7000;

// Iran coastline: [worldX, yFraction] – north/top boundary of navigable water
const IRAN_PTS = [
  [0,0.09],[400,0.10],[700,0.12],[1000,0.14],[1300,0.15],
  [1600,0.17],[1900,0.19],[2100,0.21],[2400,0.22],[2700,0.23],
  [3000,0.25],[3300,0.24],[3600,0.22],[3900,0.19],
  [4200,0.16],[4600,0.13],[5100,0.11],[6000,0.10],[7000,0.09]
];
// Oman/UAE coastline: south/bottom boundary
const OMAN_PTS = [
  [0,0.91],[500,0.89],[900,0.87],[1200,0.84],[1500,0.80],
  [1800,0.76],[2000,0.71],[2300,0.67],[2600,0.65],[2900,0.68],
  [3200,0.73],[3600,0.78],[4000,0.83],[4400,0.87],
  [5000,0.90],[6000,0.91],[7000,0.91]
];
// [worldX, yFrac, rxWorld, ryFrac, label, pushSouth]
const ISLANDS = [
  [1150, 0.34, 24, 0.038, 'Greater Tunb', true],
  [1380, 0.38, 18, 0.030, 'Lesser Tunb', true],
  [2150, 0.33, 100, 0.038, 'Qeshm Island', true],
  [2950, 0.39, 24, 0.034, 'Larak', true],
  [3050, 0.30, 26, 0.042, 'Hormuz Is.', true],
];

function coastY(pts, wx) {
  if (wx <= pts[0][0]) return pts[0][1] * H;
  if (wx >= pts[pts.length-1][0]) return pts[pts.length-1][1] * H;
  for (let i = 0; i < pts.length-1; i++) {
    if (wx >= pts[i][0] && wx < pts[i+1][0]) {
      let t = (wx-pts[i][0])/(pts[i+1][0]-pts[i][0]);
      t = t*t*(3-2*t);
      return (pts[i][1]+t*(pts[i+1][1]-pts[i][1])) * H;
    }
  }
  return pts[pts.length-1][1] * H;
}

// ═══ CONSTANTS ═══════════════════════════════════════════════════════════════
const BASE_SPD = 62, SPD_WAVE = 4;
const PL_VERT  = 125;
const PL_W = 68, PL_H = 20;
const COL = { iran:'#C0392B', drone:'#E74C3C', mine:'#717D7E', miss:'#E67E22',
              escort:'#1A5276', hull:'#2C3E50', deck:'#3D5166',
              super:'#ECF0F1', pipe:'#5D7D95' };

// ═══ AUDIO ═══════════════════════════════════════════════════════════════════
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if (AC.state==='suspended') AC.resume();
  return AC;
}
function sndBoom(vol=1, big=false) {
  try {
    const ac=getAC(), t=ac.currentTime;
    // Noise burst
    const buf=ac.createBuffer(1,ac.sampleRate*0.45,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.4);
    const src=ac.createBufferSource(); src.buffer=buf;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=big?520:320;
    const gn=ac.createGain(); gn.gain.setValueAtTime(vol*(big?1.8:1.0),t);
    gn.gain.exponentialRampToValueAtTime(0.001,t+0.42);
    src.connect(lp); lp.connect(gn); gn.connect(ac.destination);
    src.start(t); src.stop(t+0.45);
    // Sub thump
    const osc=ac.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(big?58:90,t);
    osc.frequency.exponentialRampToValueAtTime(18,t+0.28);
    const gn2=ac.createGain(); gn2.gain.setValueAtTime(vol*(big?1.2:0.7),t);
    gn2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    osc.connect(gn2); gn2.connect(ac.destination);
    osc.start(t); osc.stop(t+0.3);
  } catch(e){}
}
function sndCannon() {
  try {
    const ac=getAC(), t=ac.currentTime;
    const buf=ac.createBuffer(1,ac.sampleRate*0.18,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.8);
    const src=ac.createBufferSource(); src.buffer=buf;
    const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=280;
    const gn=ac.createGain(); gn.gain.setValueAtTime(0.9,t);
    gn.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    src.connect(hp); hp.connect(gn); gn.connect(ac.destination);
    src.start(t); src.stop(t+0.2);
  } catch(e){}
}
function sndHit() {
  try {
    const ac=getAC(), t=ac.currentTime;
    // Alarm beep
    const osc=ac.createOscillator(); osc.type='square'; osc.frequency.value=440;
    const gn=ac.createGain(); gn.gain.setValueAtTime(0.4,t);
    gn.gain.setValueAtTime(0.4,t+0.07); gn.gain.setValueAtTime(0,t+0.08);
    gn.gain.setValueAtTime(0.4,t+0.15); gn.gain.setValueAtTime(0,t+0.16);
    osc.connect(gn); gn.connect(ac.destination);
    osc.start(t); osc.stop(t+0.2);
    sndBoom(0.7, false);
  } catch(e){}
}
function sndFlare() {
  try {
    const ac=getAC(), t=ac.currentTime;
    const buf=ac.createBuffer(1,ac.sampleRate*0.32,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.6*Math.pow(1-i/d.length,0.5);
    const src=ac.createBufferSource(); src.buffer=buf;
    const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=0.8;
    const gn=ac.createGain(); gn.gain.setValueAtTime(0.7,t);
    gn.gain.exponentialRampToValueAtTime(0.001,t+0.32);
    src.connect(bp); bp.connect(gn); gn.connect(ac.destination);
    src.start(t); src.stop(t+0.35);
  } catch(e){}
}
function sndPickup() {
  try {
    const ac=getAC(), t=ac.currentTime;
    [523,659,784].forEach((f,i)=>{
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=ac.createGain(); g.gain.setValueAtTime(0,t+i*0.07);
      g.gain.linearRampToValueAtTime(0.3,t+i*0.07+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.18);
      o.connect(g); g.connect(ac.destination);
      o.start(t+i*0.07); o.stop(t+i*0.07+0.2);
    });
  } catch(e){}
}
// Engine hum — started on first game, stopped on end
let engineNode=null, engineGain=null;
function startEngine() {
  try {
    if (engineNode) return;
    const ac=getAC();
    engineNode=ac.createOscillator(); engineNode.type='sawtooth';
    engineNode.frequency.value=42;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=90;
    engineGain=ac.createGain(); engineGain.gain.value=0.07;
    engineNode.connect(lp); lp.connect(engineGain); engineGain.connect(ac.destination);
    engineNode.start();
  } catch(e){}
}
function stopEngine() {
  try { if(engineNode){engineNode.stop();engineNode=null;engineGain=null;} } catch(e){}
}

// ═══ STATE ═══════════════════════════════════════════════════════════════════
let gs = 'TITLE';
let scrollX, score, hull, wave, waveTimer, spawnTimer, gTime;
let player, enemies, bullets, exps, pickups, wakes, hitFlash;
let touchY = null, keys = {}, titleT = 0, finalScore = 0, lastTap = 0;
let cannonShells = [], muzzleFlash = 0, aimIndicator = null;
let touchStartX = 0, touchStartY = 0, touchMoved = false, justFlared = false;
let mouseX = -999, mouseY = -999;
let shakeAmt = 0, shakeDur = 0, fireParticles = [];

function newGame() {
  scrollX=0; score=0; hull=100; wave=1;
  waveTimer=0; spawnTimer=2; gTime=0; hitFlash=0; muzzleFlash=0; aimIndicator=null;
  shakeAmt=0; shakeDur=0; fireParticles=[];
  enemies=[]; bullets=[]; exps=[]; pickups=[]; wakes=[]; cannonShells=[];
  player = { wx:W*0.25, y:H*0.65, flares:3, escort:0, iframes:0, cannonCool:0 };
  touchY = H*0.65;
  gs = 'PLAY';
  startEngine();
}

// ═══ INPUT ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='KeyF') fireFlare();
  if (e.code==='Space') { e.preventDefault(); if (gs!=='PLAY') newGame(); }
  if ((e.code==='Enter'||e.code==='KeyX') && gs==='PLAY') fireCannon(mouseX, mouseY);
});
document.addEventListener('keyup', e => keys[e.code]=false);
document.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });
document.addEventListener('click', e => {
  if (gs==='TITLE'||gs==='DEAD'||gs==='WIN') { newGame(); return; }
  if (gs==='PLAY') fireCannon(e.clientX, e.clientY);
});

C.addEventListener('touchstart', e => {
  e.preventDefault();
  const now = Date.now();
  if (gs==='TITLE'||gs==='DEAD'||gs==='WIN') { newGame(); return; }
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchY = e.touches[0].clientY;
  touchMoved = false; justFlared = false;
  if (now-lastTap < 280) { fireFlare(); justFlared = true; }
  lastTap = now;
},{passive:false});

C.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gs==='PLAY') {
    touchY = e.touches[0].clientY;
    const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
    if (Math.hypot(dx,dy)>14) touchMoved=true;
  }
},{passive:false});

C.addEventListener('touchend', e => {
  e.preventDefault();
  if (gs!=='PLAY'||justFlared) return;
  const tx=e.changedTouches[0].clientX, ty=e.changedTouches[0].clientY;
  const dist=Math.hypot(tx-touchStartX, ty-touchStartY);
  if (dist<22) fireCannon(tx, ty);
},{passive:false});

function fireFlare() {
  if (gs!=='PLAY'||player.flares<=0) return;
  player.flares--;
  sndFlare();
  for (let i=enemies.length-1; i>=0; i--) {
    const e=enemies[i];
    if ((e.type==='missile'||e.type==='drone') && Math.abs(e.wx-player.wx)<420) {
      boom(e.wx,e.y,0.65); score+=30;
      enemies.splice(i,1);
    }
  }
  hitFlash = 0.3;
}

function fireCannon(sx, sy) {
  if (gs!=='PLAY') return;
  if (player.cannonCool > 0) return; // still reloading
  // Convert screen tap to world coords for direction
  const twx = sx + scrollX;
  const dx = twx - player.wx, dy = sy - player.y;
  const d = Math.hypot(dx, dy) || 1;
  const spd = 520;
  cannonShells.push({
    wx: player.wx + PL_W/2 + 4,
    y: player.y,
    vx: dx/d * spd,
    vy: dy/d * spd,
    dist: 0,
    maxDist: 580
  });
  player.cannonCool = 0.65;
  muzzleFlash = 0.14;
  sndCannon();
  aimIndicator = { sx, sy, life: 0.55 };
}


const rnd = (a,b) => a+Math.random()*(b-a);
const rndI= (a,b) => 0|rnd(a,b);

function boom(wx, y, sc=1) {
  const big = sc >= 1.0;
  sndBoom(Math.min(sc, 1.0), big);
  if (big) { shakeAmt = 9*sc; shakeDur = 0.28; }
  else      { shakeAmt = Math.max(shakeAmt, 4*sc); shakeDur = Math.max(shakeDur, 0.15); }

  const e = { wx, y, r:5, a:1, sc, pct:[], debris:[], smoke:[] };
  // Sparks
  const nSpark = big ? 22 : 12;
  for (let i=0;i<nSpark;i++) {
    const spd = rnd(2.5, 8.5) * sc;
    const ang = rnd(0, Math.PI*2);
    e.pct.push({ x:0, y:0, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
                 l:1, col: rnd(0,1)<0.5 ? 0 : 1 }); // 0=yellow,1=white
  }
  // Debris shards
  const nDeb = big ? 10 : 5;
  for (let i=0;i<nDeb;i++) {
    const spd = rnd(1.5, 5) * sc;
    const ang = rnd(0, Math.PI*2);
    e.debris.push({ x:0, y:0, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
                    len: rnd(4,10)*sc, ang, l:1 });
  }
  // Smoke puffs
  const nSmk = big ? 8 : 4;
  for (let i=0;i<nSmk;i++) {
    e.smoke.push({ x:rnd(-6,6)*sc, y:rnd(-6,6)*sc,
                   vx:rnd(-0.6,0.6)*sc, vy:rnd(-1.8,-0.4)*sc,
                   r:rnd(6,12)*sc, l:0.85 });
  }
  exps.push(e);
}

// ═══ SPAWN ═══════════════════════════════════════════════════════════════════
function spawnWave() {
  const frontWX = player.wx + W*0.78 + rnd(80,320);
  if (frontWX > WORLD_W-700) return;

  const typePool = wave<2 ? ['speedboat','speedboat','mine']
                 : wave<3 ? ['speedboat','drone','mine']
                 : wave<5 ? ['speedboat','drone','mine','missile']
                 :          ['speedboat','drone','missile','missile','mine'];
  const count = rndI(1, Math.min(wave+1,5));
  for (let i=0; i<count; i++) {
    const wx = frontWX + i*rnd(90,220);
    const iY  = coastY(IRAN_PTS, wx);
    const oY  = coastY(OMAN_PTS, wx);
    const type = typePool[rndI(0,typePool.length)];
    const spawnY = type==='mine'
      ? rnd(iY+35, oY-35)
      : rnd(iY+12, iY+H*0.18);
    const e = { type, wx, y:Math.max(iY+12,Math.min(oY-12,spawnY)), timer:0 };
    switch(type) {
      case 'speedboat': e.vx=rnd(-45,-90); e.shootT=rnd(1.5,3.5); e.w=22;e.h=9; break;
      case 'drone':     e.vx=rnd(-30,-55); e.vy=0; e.w=18;e.h=18; break;
      case 'mine':      e.vx=0; e.vy=0; e.w=20;e.h=20; break;
      case 'missile':   e.vx=rnd(-185,-255); e.vy=rnd(25,55); e.w=28;e.h=8; break;
    }
    enemies.push(e);
  }
  if (Math.random()<0.38) {
    const px=frontWX+120;
    const iY=coastY(IRAN_PTS,px), oY=coastY(OMAN_PTS,px);
    pickups.push({wx:px, y:rnd(iY+45,oY-45),
      type:['repair','flare','escort'][rndI(0,3)], pulse:0});
  }
}

// ═══ UPDATE ══════════════════════════════════════════════════════════════════
let prevT = 0;
function update(now) {
  const dt = Math.min((now-prevT)/1000, 0.05);
  prevT = now;
  if (gs!=='PLAY') return;

  gTime += dt; score += dt*12;
  if (hitFlash>0) hitFlash -= dt*3;
  if (muzzleFlash>0) muzzleFlash -= dt*8;
  if (player.cannonCool>0) player.cannonCool -= dt;
  if (aimIndicator) { aimIndicator.life -= dt*2.2; if (aimIndicator.life<=0) aimIndicator=null; }

  // Scroll
  const spd = BASE_SPD + wave*SPD_WAVE;
  scrollX += spd*dt;
  player.wx = scrollX + W*0.25;

  if (scrollX+W >= WORLD_W) {
    finalScore = Math.round(score + hull*14);
    stopEngine(); gs='WIN'; return;
  }

  // ── Player ──────────────────────────────────────────────────────────────
  const iY = coastY(IRAN_PTS, player.wx);
  const oY = coastY(OMAN_PTS, player.wx);
  let tgt = touchY!==null ? touchY : player.y;
  if (keys['ArrowUp']  ||keys['KeyW']) tgt -= 5;
  if (keys['ArrowDown']||keys['KeyS']) tgt += 5;
  const dy = tgt-player.y, step=PL_VERT*dt;
  player.y += dy>step?step:dy<-step?-step:dy;
  // Clamp to channel
  player.y = Math.max(iY+PL_H/2+4, Math.min(oY-PL_H/2-4, player.y));
  // Island avoidance – always push south
  for (const isl of ISLANDS) {
    const dx = Math.abs(player.wx - isl[0]);
    const dy2= Math.abs(player.y  - isl[1]*H);
    const rx = isl[2]+PL_W*0.55, ry = isl[3]*H+PL_H*0.55;
    if (dx<rx && dy2<ry) player.y = isl[1]*H + ry + 2;
  }
  if (player.iframes>0) player.iframes-=dt;
  if (player.escort >0) player.escort -=dt;

  // Wake
  wakes.push({wx:player.wx-6, y:player.y, l:1});
  if (wakes.length>50) wakes.shift();
  wakes.forEach(w=>w.l-=dt*1.9);

  // Wave escalation & spawn
  waveTimer+=dt; if (waveTimer>13){wave++;waveTimer=0;}
  spawnTimer-=dt;
  if (spawnTimer<=0) { spawnWave(); spawnTimer=rnd(2.8,5.5)/(1+wave*0.1); }

  // ── Enemies ──────────────────────────────────────────────────────────────
  for (let i=enemies.length-1; i>=0; i--) {
    const e=enemies[i];
    e.timer+=dt;
    if (e.wx-scrollX < -160) { enemies.splice(i,1); continue; }

    if (e.type==='drone') {
      const dx=player.wx-e.wx, dy2=player.y-e.y, d=Math.hypot(dx,dy2)||1;
      const s=78+wave*9; e.wx+=dx/d*s*dt; e.y+=dy2/d*s*dt;
    } else if (e.type==='missile') {
      const ty=player.y-e.y;
      e.vy=Math.max(-110,Math.min(110, e.vy*0.97+ty*0.03*55));
      e.wx+=e.vx*dt; e.y+=e.vy*dt;
    } else if (e.type==='speedboat') {
      e.wx+=e.vx*dt; e.y+=Math.sin(e.timer*2.4)*38*dt;
      e.shootT-=dt;
      if (e.shootT<=0) {
        e.shootT=rnd(2,4.5);
        const dx=player.wx-e.wx, dy2=player.y-e.y, d=Math.hypot(dx,dy2)||1;
        const bs=195+wave*14;
        bullets.push({wx:e.wx,y:e.y,vx:dx/d*bs,vy:dy2/d*bs,foe:true});
      }
    }
    // Escort auto-fire
    if (player.escort>0 && e.type!=='mine') {
      const dx=e.wx-player.wx;
      if (dx>0 && dx<360 && rnd(0,1)<dt*2.2) {
        const d=Math.hypot(dx,e.y-player.y)||1;
        bullets.push({wx:player.wx+28,y:player.y-38,
          vx:dx/d*290, vy:(e.y-player.y)/d*290, foe:false});
      }
    }
    // Collision
    if (player.iframes<=0) {
      const hitW=((e.w||20)+PL_W)*0.5-4, hitH=((e.h||20)+PL_H)*0.5-4;
      if (Math.abs(e.wx-player.wx)<hitW && Math.abs(e.y-player.y)<hitH) {
        const dmg=e.type==='missile'?35:e.type==='mine'?42:15;
        hull-=dmg; player.iframes=1.8; hitFlash=0.8;
        shakeAmt=12; shakeDur=0.35;
        sndHit();
        boom(e.wx,e.y); enemies.splice(i,1);
        if (hull<=0){hull=0;finalScore=Math.round(score);stopEngine();gs='DEAD';return;}
        continue;
      }
    }
  }

  // ── Bullets ──────────────────────────────────────────────────────────────
  for (let i=bullets.length-1; i>=0; i--) {
    const b=bullets[i];
    b.wx+=b.vx*dt; b.y+=b.vy*dt;
    const sx=b.wx-scrollX;
    if (sx<-50||sx>W+50||b.y<0||b.y>H){bullets.splice(i,1);continue;}
    if (!b.foe) {
      let hit=false;
      for (let j=enemies.length-1;j>=0;j--) {
        if (Math.abs(b.wx-enemies[j].wx)<22&&Math.abs(b.y-enemies[j].y)<20) {
          boom(enemies[j].wx,enemies[j].y,0.65); score+=55;
          enemies.splice(j,1); bullets.splice(i,1); hit=true; break;
        }
      }
      if (hit) continue;
    } else if (player.iframes<=0) {
      if (Math.abs(b.wx-player.wx)<PL_W/2+5&&Math.abs(b.y-player.y)<PL_H/2+5) {
        hull-=10; player.iframes=0.7; hitFlash=0.6;
        shakeAmt=6; shakeDur=0.18; sndHit();
        boom(b.wx,b.y,0.4); bullets.splice(i,1);
        if (hull<=0){hull=0;finalScore=Math.round(score);stopEngine();gs='DEAD';return;}
        continue;
      }
    }
  }

  // ── Cannon Shells ────────────────────────────────────────────────────────
  for (let i=cannonShells.length-1; i>=0; i--) {
    const s=cannonShells[i];
    const step=Math.hypot(s.vx,s.vy)*dt;
    s.wx+=s.vx*dt; s.y+=s.vy*dt; s.dist+=step;
    const sx2=s.wx-scrollX;
    if (sx2<-40||sx2>W+40||s.y<0||s.y>H||s.dist>s.maxDist) {
      if (s.dist>=s.maxDist) boom(s.wx,s.y,0.45); // fizzle
      cannonShells.splice(i,1); continue;
    }
    let hit=false;
    for (let j=enemies.length-1;j>=0;j--) {
      const e=enemies[j];
      const hitR=(e.type==='mine'?18:e.type==='missile'?20:16);
      if (Math.hypot(s.wx-e.wx, s.y-e.y)<hitR) {
        boom(e.wx,e.y,e.type==='missile'?1.1:0.75);
        score += e.type==='missile'?110:e.type==='mine'?90:70;
        enemies.splice(j,1); cannonShells.splice(i,1); hit=true; break;
      }
    }
    if (hit) continue;
  }

  // ── Pickups ──────────────────────────────────────────────────────────────
  for (let i=pickups.length-1;i>=0;i--) {
    const p=pickups[i]; p.pulse+=dt*3.2;
    if (p.wx-scrollX<-65){pickups.splice(i,1);continue;}
    if (Math.abs(p.wx-player.wx)<38&&Math.abs(p.y-player.y)<32) {
      if (p.type==='repair') hull=Math.min(hull+24,100);
      else if (p.type==='flare') player.flares=Math.min(player.flares+2,6);
      else player.escort=13;
      sndPickup();
      score+=45; boom(p.wx,p.y,0.35); pickups.splice(i,1);
    }
  }

  // ── Screen shake ─────────────────────────────────────────────────────────
  if (shakeDur>0) { shakeDur-=dt; if(shakeDur<0){shakeDur=0;shakeAmt=0;} }

  // ── Fire particles (low hull) ─────────────────────────────────────────────
  if (hull<=40 && gs==='PLAY') {
    const rate = hull<=15 ? 0.45 : 0.18;
    if (rnd(0,1)<rate) {
      const ox=rnd(-22,18), oy=rnd(-8,8);
      fireParticles.push({
        x: player.wx + ox, y: player.y + oy,
        vx: rnd(-0.3,0.3)*60, vy: rnd(-60,-100),
        r: rnd(3,7), l:1,
        smoke: rnd(0,1)<0.5
      });
    }
  }
  for (let i=fireParticles.length-1;i>=0;i--) {
    const p=fireParticles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy*=0.97;
    p.l -= dt*(p.smoke?1.1:1.8);
    if (p.l<=0) fireParticles.splice(i,1);
  }

  // ── Explosions ───────────────────────────────────────────────────────────
  for (let i=exps.length-1;i>=0;i--) {
    const e=exps[i];
    e.r += (4.5+e.sc*2)*dt*60*0.016;
    e.a -= 0.033;
    e.pct.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93; p.l-=0.028; });
    e.debris.forEach(d=>{ d.x+=d.vx; d.y+=d.vy; d.vx*=0.91; d.vy*=0.91; d.l-=0.022; });
    e.smoke.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.r+=0.9; s.l-=0.018; });
    if (e.a<=0) exps.splice(i,1);
  }

  if (gs==='WIN') { stopEngine(); return; }
}

// ═══ DRAW ════════════════════════════════════════════════════════════════════
function drawBg() {
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#091C38'); g.addColorStop(1,'#0C2548');
  X.fillStyle=g; X.fillRect(0,0,W,H);

  // Nautical grid
  X.strokeStyle='rgba(0,140,255,0.052)'; X.lineWidth=0.8;
  const gs2=72, ox=scrollX%gs2;
  for (let x=-ox;x<W;x+=gs2){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for (let y=0;y<H;y+=gs2){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // Water shimmer
  const now=Date.now()/1000;
  X.strokeStyle='rgba(60,160,255,0.025)'; X.lineWidth=1.5;
  for (let i=0;i<22;i++) {
    const y=(i*H/22+now*5)%H;
    X.beginPath();X.moveTo(0,y+Math.sin(now*0.6+i)*2.5);
    X.lineTo(W,y+Math.cos(now*0.5+i*1.3)*2.5);X.stroke();
  }

  // Outbound shipping lane guide (southern lane is correct per TSS)
  const iY=coastY(IRAN_PTS,player.wx), oY=coastY(OMAN_PTS,player.wx);
  const laneY = iY+(oY-iY)*0.62;
  X.setLineDash([18,14]); X.strokeStyle='rgba(255,215,80,0.16)'; X.lineWidth=1.2;
  X.beginPath();X.moveTo(0,laneY);X.lineTo(W,laneY);X.stroke();
  X.setLineDash([]);

  // Geographic zone watermark
  const prog=player.wx/WORLD_W;
  const zone=prog<0.21?'PERSIAN GULF':prog<0.65?'STRAIT OF HORMUZ':'GULF OF OMAN';
  X.fillStyle='rgba(255,215,80,0.10)';
  X.font=`${Math.min(H*0.09,26)}px Courier New`;
  X.textAlign='center'; X.textBaseline='middle';
  X.fillText(zone, W/2, H/2);
  X.textAlign='left'; X.textBaseline='alphabetic';

  // Approximate coords (top-right corner)
  const lat=(26.5-(prog*1.0)).toFixed(2);
  const lon=(56.0+(prog*2.0)).toFixed(2);
  X.fillStyle='rgba(100,180,255,0.35)';
  X.font=`${Math.min(H*0.026,10)}px Courier New`;
  X.textAlign='right';
  X.fillText(`${lat}°N  ${lon}°E`, W-8, H-42);
  X.textAlign='left';
}

function drawCoast() {
  const N=100, x0=scrollX-120, x1=scrollX+W+120;

  function fillCoast(pts, top) {
    X.beginPath();
    for (let i=0;i<=N;i++){
      const wx=x0+(x1-x0)*i/N, sx=wx-scrollX, sy=coastY(pts,wx);
      i===0?X.moveTo(sx,sy):X.lineTo(sx,sy);
    }
    if (top){X.lineTo(W+120,0);X.lineTo(-120,0);}
    else    {X.lineTo(W+120,H);X.lineTo(-120,H);}
    X.closePath();
  }

  // Iran land
  fillCoast(IRAN_PTS,true);
  const gI=X.createLinearGradient(0,0,0,H*0.28);
  gI.addColorStop(0,'#A0876A'); gI.addColorStop(1,'#7C6548');
  X.fillStyle=gI; X.fill();

  // Iran coast edge
  X.strokeStyle='#D4B87C'; X.lineWidth=2.5;
  X.beginPath();
  for (let i=0;i<=N;i++){
    const wx=x0+(x1-x0)*i/N, sx=wx-scrollX, sy=coastY(IRAN_PTS,wx);
    i===0?X.moveTo(sx,sy):X.lineTo(sx,sy);
  }
  X.stroke();

  // Oman land
  fillCoast(OMAN_PTS,false);
  const gO=X.createLinearGradient(0,H*0.68,0,H);
  gO.addColorStop(0,'#7C6548'); gO.addColorStop(1,'#A0876A');
  X.fillStyle=gO; X.fill();

  X.strokeStyle='#D4B87C'; X.lineWidth=2.5;
  X.beginPath();
  for (let i=0;i<=N;i++){
    const wx=x0+(x1-x0)*i/N, sx=wx-scrollX, sy=coastY(OMAN_PTS,wx);
    i===0?X.moveTo(sx,sy):X.lineTo(sx,sy);
  }
  X.stroke();

  // Labels
  const fs=`bold ${Math.min(H*0.034,13)}px Courier New`;
  X.font=fs; X.fillStyle='rgba(255,228,160,0.78)';
  X.fillText('IRAN', 8, coastY(IRAN_PTS,scrollX+90)-10);
  X.fillText('OMAN / UAE', 8, coastY(OMAN_PTS,scrollX+90)+17);
}

function drawIslands() {
  for (const isl of ISLANDS) {
    const sx=isl[0]-scrollX;
    if (sx<-isl[2]-60||sx>W+isl[2]+60) continue;
    const sy=isl[1]*H, rx=isl[2], ry=isl[3]*H;
    X.beginPath(); X.ellipse(sx,sy,rx,ry,0,0,Math.PI*2);
    X.fillStyle='#7C6548'; X.fill();
    X.strokeStyle='#D4B87C'; X.lineWidth=1.5; X.stroke();
    // Coastline texture lines
    X.strokeStyle='rgba(160,130,80,0.5)'; X.lineWidth=0.8;
    X.beginPath(); X.ellipse(sx,sy,rx*0.7,ry*0.7,0,0,Math.PI*2); X.stroke();
    X.fillStyle='rgba(255,225,150,0.82)';
    X.font=`${Math.min(H*0.024,9.5)}px Courier New`;
    X.textAlign='center';
    X.fillText(isl[4], sx, sy+ry+13);
    X.textAlign='left';
  }
}

function drawWakes() {
  for (const w of wakes) {
    if (w.l<=0) continue;
    const sx=w.wx-scrollX;
    X.fillStyle=`rgba(170,225,255,${w.l*0.25})`;
    X.beginPath(); X.ellipse(sx,w.y,13*(1-w.l*0.25),3.5,0,0,Math.PI*2); X.fill();
  }
}

function drawPlayer() {
  const sx=player.wx-scrollX, sy=player.y;
  if (player.iframes>0&&(player.iframes*9|0)%2===0) return;
  X.save(); X.translate(sx,sy);
  // Hull
  X.fillStyle=COL.hull;
  X.beginPath();
  X.moveTo(PL_W/2,0); X.lineTo(PL_W/2-10,-PL_H/2);
  X.lineTo(-PL_W/2,-PL_H/2); X.lineTo(-PL_W/2,PL_H/2);
  X.lineTo(PL_W/2-10,PL_H/2); X.closePath(); X.fill();
  // Deck
  X.fillStyle=COL.deck;
  X.fillRect(-PL_W/2+4,-PL_H/2+3,PL_W-18,PL_H-6);
  // Superstructure
  X.fillStyle=COL.super; X.fillRect(-PL_W/2+5,-PL_H/2+4,14,PL_H-8);
  // Tanks / pipes
  X.fillStyle=COL.pipe;
  for (let i=0;i<4;i++) X.fillRect(-4+i*13,-PL_H/2+5,10,PL_H-10);
  // Bow marker
  X.fillStyle='rgba(255,200,0,0.7)';
  X.beginPath(); X.moveTo(PL_W/2,0); X.lineTo(PL_W/2-6,-5); X.lineTo(PL_W/2-6,5);
  X.closePath(); X.fill();
  // Deck cannon barrel (rotates toward last aim)
  X.fillStyle='#BDC3C7';
  X.save();
  X.translate(4, 0);
  X.fillRect(0,-2.5,18,5);   // barrel
  X.fillStyle='#95A5A6';
  X.beginPath(); X.arc(0,0,5.5,0,Math.PI*2); X.fill(); // turret base
  X.restore();
  X.restore();

  // Muzzle flash
  if (muzzleFlash>0) {
    const fsx=sx+PL_W/2+20, fsy=sy;
    const fa=muzzleFlash/0.14;
    X.save();
    X.globalAlpha=fa*0.9;
    const fg=X.createRadialGradient(fsx,fsy,0,fsx,fsy,22);
    fg.addColorStop(0,'rgba(255,255,200,1)'); fg.addColorStop(1,'rgba(255,140,0,0)');
    X.fillStyle=fg; X.beginPath(); X.arc(fsx,fsy,22,0,Math.PI*2); X.fill();
    X.globalAlpha=1;
    X.restore();
  }

  // Escort ship
  if (player.escort>0) {
    X.save(); X.translate(sx, sy-44);
    X.fillStyle=COL.escort;
    X.beginPath();
    X.moveTo(24,0);X.lineTo(18,-11);X.lineTo(-24,-11);
    X.lineTo(-24,11);X.lineTo(18,11); X.closePath(); X.fill();
    // Gun barrel
    X.fillStyle='#AED6F1'; X.fillRect(22,-1.5,10,3);
    X.fillStyle='#ECF0F1';
    X.font=`bold 7px Courier New`; X.textAlign='center'; X.textBaseline='middle';
    X.fillText('USN', 0, 0);
    X.restore();
  }
}

function drawEnemies() {
  const now=Date.now()/1000;
  for (const e of enemies) {
    const sx=e.wx-scrollX;
    if (sx<-70||sx>W+70) continue;
    X.save(); X.translate(sx,e.y);
    switch(e.type) {
      case 'speedboat':
        X.fillStyle=COL.iran;
        X.beginPath();
        X.moveTo(-13,0);X.lineTo(13,-5.5);X.lineTo(13,5.5); X.closePath(); X.fill();
        // Flag
        X.fillStyle='#1A6B15'; X.fillRect(2,-13,9,7);
        X.fillStyle='#FFF';    X.fillRect(2,-13,9,2);
        X.fillStyle=COL.iran;  X.fillRect(2,-11,9,2);
        // Wake
        X.fillStyle='rgba(255,255,255,0.22)';
        X.beginPath(); X.ellipse(-16,0,8,2.5,0,0,Math.PI*2); X.fill();
        break;
      case 'drone':
        X.save(); X.rotate(e.timer*2.2);
        X.fillStyle=COL.drone; X.fillRect(-9,-2.5,18,5); X.fillRect(-2.5,-9,5,18);
        // Props
        for(let k=0;k<4;k++){
          X.save(); X.rotate(k*Math.PI/2);
          X.fillStyle='rgba(200,50,50,0.6)';
          X.beginPath(); X.ellipse(10,0,8,2.5,0,0,Math.PI*2); X.fill();
          X.restore();
        }
        X.restore();
        X.beginPath(); X.arc(0,0,5,0,Math.PI*2);
        X.fillStyle='#F39C12'; X.fill();
        if ((now*5|0)%2){X.beginPath();X.arc(0,0,2.5,0,Math.PI*2);X.fillStyle='#FFF';X.fill();}
        break;
      case 'mine':
        X.fillStyle=COL.mine;
        X.beginPath(); X.arc(0,0,10,0,Math.PI*2); X.fill();
        X.strokeStyle='#AAB7B8'; X.lineWidth=1.5; X.stroke();
        for(let k=0;k<8;k++){
          const a=k*Math.PI/4, c=Math.cos(a), s=Math.sin(a);
          X.beginPath(); X.moveTo(c*10,s*10); X.lineTo(c*17,s*17); X.stroke();
          X.beginPath(); X.arc(c*17,s*17,2.5,0,Math.PI*2);
          X.fillStyle='#E74C3C'; X.fill();
        }
        break;
      case 'missile':
        X.fillStyle=COL.miss;
        X.beginPath();
        X.moveTo(15,0);X.lineTo(-12,-4.5);X.lineTo(-14,0);X.lineTo(-12,4.5);
        X.closePath(); X.fill();
        X.fillStyle='#D35400';
        X.beginPath();X.moveTo(-12,-4.5);X.lineTo(-20,-10);X.lineTo(-14,0);X.closePath();X.fill();
        X.beginPath();X.moveTo(-12,4.5); X.lineTo(-20,10); X.lineTo(-14,0);X.closePath();X.fill();
        const fa=0.45+Math.sin(now*30)*0.5;
        X.fillStyle=`rgba(255,110,0,${fa})`;
        X.beginPath(); X.moveTo(-14,0);X.lineTo(-24,-5.5);X.lineTo(-22,0);X.lineTo(-24,5.5);
        X.closePath(); X.fill();
        X.fillStyle=`rgba(255,220,60,${fa*0.6})`;
        X.beginPath(); X.moveTo(-14,0);X.lineTo(-20,-2.5);X.lineTo(-19,0);X.lineTo(-20,2.5);
        X.closePath(); X.fill();
        break;
    }
    X.restore();
  }
}

function drawCannonShells() {
  for (const s of cannonShells) {
    const sx2=s.wx-scrollX;
    // Tracer trail
    const tx=sx2-s.vx*0.06, ty=s.y-s.vy*0.06;
    const tg=X.createLinearGradient(tx,ty,sx2,s.y);
    tg.addColorStop(0,'rgba(255,255,180,0)');
    tg.addColorStop(1,'rgba(255,240,100,0.85)');
    X.strokeStyle=tg; X.lineWidth=3.5;
    X.beginPath(); X.moveTo(tx,ty); X.lineTo(sx2,s.y); X.stroke();
    // Shell head
    X.fillStyle='#FFF5AA';
    X.beginPath(); X.arc(sx2,s.y,4.5,0,Math.PI*2); X.fill();
    X.fillStyle='rgba(255,255,255,0.85)';
    X.beginPath(); X.arc(sx2,s.y,2,0,Math.PI*2); X.fill();
    // Glow
    const gg=X.createRadialGradient(sx2,s.y,0,sx2,s.y,12);
    gg.addColorStop(0,'rgba(255,220,60,0.5)');
    gg.addColorStop(1,'rgba(255,200,0,0)');
    X.fillStyle=gg; X.beginPath(); X.arc(sx2,s.y,12,0,Math.PI*2); X.fill();
  }
}

function drawAimIndicator() {
  if (!aimIndicator||aimIndicator.life<=0) return;
  const {sx,sy,life}=aimIndicator;
  const a=Math.min(1,life*2.5);
  const r=14*(1-life*0.5);
  X.save(); X.globalAlpha=a;
  X.strokeStyle='rgba(255,240,80,0.9)'; X.lineWidth=2;
  X.beginPath(); X.arc(sx,sy,r,0,Math.PI*2); X.stroke();
  // Crosshair
  X.strokeStyle='rgba(255,240,80,0.7)'; X.lineWidth=1.5;
  X.beginPath(); X.moveTo(sx-10,sy); X.lineTo(sx-r+3,sy); X.stroke();
  X.beginPath(); X.moveTo(sx+10,sy); X.lineTo(sx+r-3,sy); X.stroke();
  X.beginPath(); X.moveTo(sx,sy-10); X.lineTo(sx,sy-r+3); X.stroke();
  X.beginPath(); X.moveTo(sx,sy+10); X.lineTo(sx,sy+r-3); X.stroke();
  X.restore();
}

function drawBullets() {
  for (const b of bullets) {
    const sx=b.wx-scrollX;
    const col=b.foe?'#E74C3C':'#3498DB';
    X.fillStyle=col; X.beginPath(); X.arc(sx,b.y,4,0,Math.PI*2); X.fill();
    X.fillStyle=b.foe?'rgba(231,76,60,0.38)':'rgba(52,152,219,0.38)';
    X.beginPath(); X.arc(sx-b.vx*0.028,b.y-b.vy*0.028,2.5,0,Math.PI*2); X.fill();
  }
}

function drawPickups() {
  const now=Date.now()/1000;
  for (const p of pickups) {
    const sx=p.wx-scrollX;
    if (sx<-60||sx>W+60) continue;
    const pulse=Math.sin(now*3.8)*4;
    const col=p.type==='repair'?'#2ECC71':p.type==='flare'?'#F39C12':'#3498DB';
    X.strokeStyle=col; X.lineWidth=2.5;
    X.beginPath(); X.arc(sx,p.y,15+pulse,0,Math.PI*2); X.stroke();
    X.fillStyle=col+'66'; X.beginPath(); X.arc(sx,p.y,13,0,Math.PI*2); X.fill();
    X.fillStyle='#FFF'; X.font='13px serif';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText({repair:'⚕',flare:'✦',escort:'⚓'}[p.type], sx, p.y);
    X.textAlign='left'; X.textBaseline='alphabetic';
  }
}

function drawFireParticles() {
  for (const p of fireParticles) {
    const sx2 = p.x - scrollX;
    if (p.smoke) {
      X.fillStyle=`rgba(60,55,50,${p.l*0.55})`;
      X.beginPath(); X.arc(sx2,p.y,p.r*(2-p.l),0,Math.PI*2); X.fill();
    } else {
      const col = p.l>0.5 ? `rgba(255,200,40,${p.l*0.92})` : `rgba(220,80,20,${p.l*0.85})`;
      X.fillStyle=col;
      X.beginPath(); X.arc(sx2,p.y,p.r*p.l,0,Math.PI*2); X.fill();
    }
  }
}

function drawExplosions() {
  for (const e of exps) {
    const sx=e.wx-scrollX;
    // Smoke puffs (drawn first, behind everything)
    for (const s of e.smoke) {
      if (s.l<=0) continue;
      X.fillStyle=`rgba(80,75,70,${s.l*0.55})`;
      X.beginPath(); X.arc(sx+s.x, e.y+s.y, s.r, 0, Math.PI*2); X.fill();
    }
    // Fireball ring
    X.strokeStyle=`rgba(255,130,0,${e.a*0.85})`; X.lineWidth=5*e.sc;
    X.beginPath(); X.arc(sx,e.y,e.r,0,Math.PI*2); X.stroke();
    // Inner hot core
    const cg=X.createRadialGradient(sx,e.y,0,sx,e.y,e.r*0.6);
    cg.addColorStop(0,`rgba(255,255,180,${e.a*0.8})`);
    cg.addColorStop(1,`rgba(255,160,20,0)`);
    X.fillStyle=cg; X.beginPath(); X.arc(sx,e.y,e.r*0.6,0,Math.PI*2); X.fill();
    // Debris shards
    for (const d of e.debris) {
      if (d.l<=0) continue;
      X.strokeStyle=`rgba(180,140,60,${d.l*e.a})`;
      X.lineWidth=2.5*d.l;
      X.beginPath();
      X.moveTo(sx+d.x, e.y+d.y);
      X.lineTo(sx+d.x+Math.cos(d.ang+Math.PI)*d.len*d.l,
               e.y+d.y+Math.sin(d.ang+Math.PI)*d.len*d.l);
      X.stroke();
    }
    // Sparks
    for (const p of e.pct) {
      if (p.l<=0) continue;
      const sc2=`rgba(${p.col?'255,255,255':'255,220,60'},${p.l*e.a})`;
      X.fillStyle=sc2;
      X.beginPath(); X.arc(sx+p.x, e.y+p.y, 2.8*p.l, 0, Math.PI*2); X.fill();
      // Spark trail
      X.strokeStyle=`rgba(255,180,0,${p.l*e.a*0.5})`;
      X.lineWidth=1.2;
      X.beginPath(); X.moveTo(sx+p.x,e.y+p.y);
      X.lineTo(sx+p.x-p.vx*2.5, e.y+p.y-p.vy*2.5); X.stroke();
    }
  }
}

function drawHUD() {
  const pad=9, fs=s=>Math.min(H*s*0.1,s*42);

  // Top bar
  X.fillStyle='rgba(0,6,18,0.75)'; X.fillRect(0,0,W,44);
  // Hull bar
  const bw=Math.min(155,W*0.30);
  X.fillStyle='#0A1826'; X.fillRect(pad,8,bw,22);
  const hc=hull>55?'#27AE60':hull>25?'#F39C12':'#E74C3C';
  X.fillStyle=hc; X.fillRect(pad,8,hull/100*bw,22);
  X.strokeStyle='#1E3A5A'; X.lineWidth=1; X.strokeRect(pad,8,bw,22);
  X.fillStyle='#FFF'; X.font=`bold ${fs(0.28)}px Courier New`;
  X.fillText(`HULL ${hull|0}%`,pad+5,24);
  // Score
  X.fillStyle='#F1C40F'; X.textAlign='center';
  X.font=`bold ${fs(0.38)}px Courier New`;
  X.fillText(`SCORE: ${score|0}`, W/2, 27);
  // Threat
  X.fillStyle='#E74C3C'; X.textAlign='right';
  X.font=`bold ${fs(0.28)}px Courier New`;
  X.fillText(`THREAT ${wave}`, W-pad, 27);

  // Bottom bar
  X.fillStyle='rgba(0,6,18,0.75)'; X.fillRect(0,H-38,W,38);
  const prog=Math.min(scrollX/Math.max(WORLD_W-W,1),1);
  X.fillStyle='#0A1826'; X.fillRect(pad,H-28,W-pad*2,13);
  const barW=(W-pad*2)*prog;
  // Zone colours on bar
  const b0=pad, b1=pad+(W-pad*2)*0.21, b2=pad+(W-pad*2)*0.65, b3=W-pad;
  X.fillStyle='#1A5276'; X.fillRect(b0,H-28,Math.min(barW,b1-b0),13);
  X.fillStyle='#922B21'; X.fillRect(b1,H-28,Math.max(0,Math.min(barW-(b1-b0),b2-b1)),13);
  X.fillStyle='#1A5276'; X.fillRect(b2,H-28,Math.max(0,barW-(b2-b0)),13);
  // Ship marker
  X.fillStyle='#F1C40F';
  X.fillRect(pad+barW-1.5,H-33,3,23);
  X.strokeStyle='#1E3A5A'; X.lineWidth=1; X.strokeRect(pad,H-28,W-pad*2,13);
  X.fillStyle='rgba(190,190,190,0.65)'; X.font=`${fs(0.22)}px Courier New`;
  X.textAlign='left'; X.fillText('PERSIAN GULF',pad+2,H-17);
  X.textAlign='center'; X.fillText('STRAIT OF HORMUZ',W/2,H-17);
  X.textAlign='right'; X.fillText('GULF OF OMAN',W-pad,H-17);

  // Cannon cooldown arc — drawn near ship position
  const shipSX = player.wx - scrollX;
  const coolFrac = player.cannonCool > 0 ? player.cannonCool/0.65 : 0;
  const arcR = 24;
  // Background ring
  X.strokeStyle='rgba(255,255,100,0.18)'; X.lineWidth=3.5;
  X.beginPath(); X.arc(shipSX, player.y, arcR, -Math.PI/2, Math.PI*2-Math.PI/2); X.stroke();
  if (coolFrac > 0) {
    // Reloading overlay (red arc shrinking)
    X.strokeStyle=`rgba(220,60,60,${0.55+coolFrac*0.3})`; X.lineWidth=3.5;
    X.beginPath(); X.arc(shipSX, player.y, arcR, -Math.PI/2, -Math.PI/2+coolFrac*Math.PI*2); X.stroke();
  } else {
    // Ready — bright yellow pulse
    const rp=0.5+Math.sin(Date.now()/180)*0.5;
    X.strokeStyle=`rgba(255,240,60,${rp*0.7})`; X.lineWidth=3.5;
    X.beginPath(); X.arc(shipSX, player.y, arcR, -Math.PI/2, Math.PI*2-Math.PI/2); X.stroke();
  }

  // Flares
  X.fillStyle='#F39C12'; X.textAlign='left';
  X.font=`${fs(0.27)}px Courier New`;
  let fs2='FLARES ';
  for(let i=0;i<6;i++) fs2+=i<player.flares?'◆':'◇';
  X.fillText(fs2,pad,H-5);

  // Escort timer
  if (player.escort>0) {
    X.fillStyle='#3498DB'; X.textAlign='right';
    X.font=`${fs(0.26)}px Courier New`;
    X.fillText(`⚓ ESCORT ${player.escort.toFixed(1)}s`, W-pad, H-5);
  }

  // Controls hint (first 6 seconds)
  if (gTime<6) {
    const a=Math.max(0,1-(gTime/5.5));
    X.fillStyle=`rgba(255,255,255,${a*0.7})`;
    X.font=`${fs(0.26)}px Courier New`;
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('TAP TO SHOOT  •  DRAG TO STEER  •  DOUBLE-TAP = FLARES', W/2, H/2+45);
  }

  // Hit flash overlay
  if (hitFlash>0) {
    X.fillStyle=`rgba(220,30,30,${hitFlash*0.28})`;
    X.fillRect(0,0,W,H);
  }
  X.textAlign='left'; X.textBaseline='alphabetic';
}

// ─── TITLE SCREEN ────────────────────────────────────────────────────────────
function drawTitle() {
  titleT+=0.014;
  const now=Date.now()/1000;
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#020A18'); g.addColorStop(1,'#051228');
  X.fillStyle=g; X.fillRect(0,0,W,H);
  // Animated sea
  X.strokeStyle='rgba(0,80,180,0.06)'; X.lineWidth=2;
  for (let i=0;i<24;i++) {
    const y=(i*H/24+now*14)%H;
    X.beginPath();X.moveTo(0,y+Math.sin(now*0.7+i)*3);
    X.lineTo(W,y+Math.cos(now*0.55+i*1.2)*3); X.stroke();
  }
  // Silhouette tanker
  const tx=W/2-60, ty=H*0.78;
  X.save(); X.translate(tx,ty);
  X.fillStyle='rgba(20,40,70,0.85)';
  X.beginPath();
  X.moveTo(130,0);X.lineTo(118,-17);X.lineTo(-130,-17);
  X.lineTo(-130,17);X.lineTo(118,17); X.closePath(); X.fill();
  X.fillStyle='rgba(50,80,110,0.7)';
  for (let i=0;i<5;i++) X.fillRect(-90+i*33,-17,25,12);
  X.restore();

  X.textAlign='center'; X.textBaseline='middle';
  const fz=Math.min(W*0.115,54);
  X.shadowColor='#C0392B'; X.shadowBlur=28;
  X.fillStyle='#E74C3C';
  X.font=`bold ${fz}px 'Courier New',monospace`;
  X.fillText('HORMUZ RUN', W/2, H*0.27);
  X.shadowBlur=0;

  X.fillStyle='#F1C40F';
  X.font=`${Math.min(W*0.044,16)}px Courier New`;
  X.fillText("Navigate your oil tanker through the world's", W/2, H*0.40);
  X.fillText("most dangerous shipping lane", W/2, H*0.40+21);

  X.fillStyle='rgba(200,200,200,0.72)';
  X.font=`${Math.min(W*0.033,12)}px Courier New`;
  X.fillText('⛵ IRGC Speedboats  ✈ Drones  🚀 Anti-Ship Missiles  💣 Mines', W/2, H*0.51);
  X.fillText('Pick up  ⚕ Repairs  ✦ Flares  ⚓ USN Escort', W/2, H*0.57);
  X.fillText('TAP to shoot cannon  •  DRAG to steer  •  DOUBLE-TAP for flares', W/2, H*0.63);

  const p=0.72+Math.sin(titleT*5)*0.28;
  X.fillStyle=`rgba(241,196,15,${p})`;
  X.font=`bold ${Math.min(W*0.055,21)}px Courier New`;
  X.fillText('▶  TAP TO BEGIN  ◀', W/2, H*0.72);

  X.fillStyle='rgba(120,160,200,0.5)';
  X.font=`${Math.min(W*0.027,10)}px Courier New`;
  X.fillText('Strait of Hormuz — 21% of global oil supply', W/2, H*0.92);
  X.textAlign='left'; X.textBaseline='alphabetic';
}

// ─── END SCREENS ─────────────────────────────────────────────────────────────
function drawEnd(win) {
  X.fillStyle='rgba(0,0,0,0.82)'; X.fillRect(0,0,W,H);
  X.textAlign='center'; X.textBaseline='middle';
  const fz=Math.min(W*0.1,42);
  if (win) {
    X.shadowColor='#2ECC71'; X.shadowBlur=22;
    X.fillStyle='#2ECC71'; X.font=`bold ${fz}px Courier New`;
    X.fillText('CARGO DELIVERED!', W/2, H*0.28);
    X.shadowBlur=0;
    X.fillStyle='#ECF0F1'; X.font=`${Math.min(W*0.042,16)}px Courier New`;
    X.fillText('You made it through the Strait of Hormuz!', W/2, H*0.42);
    X.fillText('The oil flows. The markets hold.', W/2, H*0.49);
  } else {
    X.shadowColor='#E74C3C'; X.shadowBlur=22;
    X.fillStyle='#E74C3C'; X.font=`bold ${fz}px Courier New`;
    X.fillText('TANKER SUNK', W/2, H*0.28);
    X.shadowBlur=0;
    X.fillStyle='#ECF0F1'; X.font=`${Math.min(W*0.042,16)}px Courier New`;
    X.fillText('Hull integrity lost. Oil spill in progress.', W/2, H*0.42);
    X.fillText('Lloyd\'s of London is not happy.', W/2, H*0.49);
  }
  X.fillStyle='#F1C40F';
  X.font=`bold ${Math.min(W*0.065,28)}px Courier New`;
  X.fillText(`SCORE: ${finalScore}`, W/2, H*0.60);
  const p=0.65+Math.sin(Date.now()/380)*0.35;
  X.fillStyle=`rgba(255,255,255,${p})`;
  X.font=`${Math.min(W*0.05,19)}px Courier New`;
  X.fillText('TAP TO PLAY AGAIN', W/2, H*0.75);
  X.textAlign='left'; X.textBaseline='alphabetic';
}

// ═══ LOOP ════════════════════════════════════════════════════════════════════
function loop(now) {
  update(now);
  if (gs==='TITLE') {
    drawTitle();
  } else if (gs==='PLAY') {
    // Screen shake
    const sx0 = shakeDur>0 ? rnd(-shakeAmt,shakeAmt) : 0;
    const sy0 = shakeDur>0 ? rnd(-shakeAmt,shakeAmt) : 0;
    X.save(); X.translate(sx0, sy0);
    drawBg(); drawCoast(); drawIslands(); drawWakes();
    drawFireParticles();
    drawExplosions(); drawPickups(); drawBullets();
    drawCannonShells(); drawAimIndicator();
    drawEnemies(); drawPlayer();
    X.restore();
    drawHUD();
  } else if (gs==='DEAD') {
    drawBg(); drawCoast(); drawIslands(); drawEnd(false);
  } else if (gs==='WIN') {
    drawBg(); drawCoast(); drawIslands(); drawEnd(true);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{prevT=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
