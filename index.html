<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HORMUZ RUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; touch-action:none; }
</style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────────────
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ── Geography ─────────────────────────────────────────────────────────────────
const WORLD_W = 7000;
const IRAN_PTS = [[0,.09],[400,.10],[700,.12],[1000,.14],[1300,.15],
  [1600,.17],[1900,.19],[2100,.21],[2400,.22],[2700,.23],
  [3000,.25],[3300,.24],[3600,.22],[3900,.19],
  [4200,.16],[4600,.13],[5100,.11],[6000,.10],[7000,.09]];
const OMAN_PTS = [[0,.91],[500,.89],[900,.87],[1200,.84],[1500,.80],
  [1800,.76],[2000,.71],[2300,.67],[2600,.65],[2900,.68],
  [3200,.73],[3600,.78],[4000,.83],[4400,.87],
  [5000,.90],[6000,.91],[7000,.91]];
const ISLANDS = [
  [1150,.34,24,.038,'Greater Tunb'],
  [1380,.38,18,.030,'Lesser Tunb'],
  [2150,.33,100,.038,'Qeshm Island'],
  [2950,.39,24,.034,'Larak'],
  [3050,.30,26,.042,'Hormuz Is.'],
];
function coastY(pts, wx) {
  if (wx <= pts[0][0]) return pts[0][1]*H;
  if (wx >= pts[pts.length-1][0]) return pts[pts.length-1][1]*H;
  for (let i=0;i<pts.length-1;i++) {
    if (wx >= pts[i][0] && wx < pts[i+1][0]) {
      let t = (wx-pts[i][0])/(pts[i+1][0]-pts[i][0]);
      t = t*t*(3-2*t);
      return (pts[i][1]+t*(pts[i+1][1]-pts[i][1]))*H;
    }
  }
  return pts[pts.length-1][1]*H;
}

// ── Zones ─────────────────────────────────────────────────────────────────────
const Z_GULF_END=1470, Z_CHOKE_S=2700, Z_CHOKE_E=3400, Z_STRAIT_END=4550, Z_SALVO=5800;
function getZone(wx) {
  if (wx < Z_GULF_END)   return 'GULF';
  if (wx < Z_STRAIT_END) return (wx>=Z_CHOKE_S&&wx<=Z_CHOKE_E)?'CHOKE':'STRAIT';
  return 'OMAN';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const rnd  = (a,b) => a+Math.random()*(b-a);
const rndI = (a,b) => 0|rnd(a,b);
let PL_W=68, PL_H=20, PL_VERT=125;

// ── Parallax Background Ships ─────────────────────────────────────────────────
let parallaxShips = [], parallaxBuoys = [];
const PARALLAX_FACTOR = 0.25;
const PARALLAX_SHIP_COUNT = 14;

function initParallax() {
  parallaxShips = []; parallaxBuoys = [];
  for (let i = 0; i < PARALLAX_SHIP_COUNT; i++) {
    const scale = 0.4 + Math.random() * 0.6;
    parallaxShips.push({
      wx:    Math.random() * WORLD_W,
      yOff:  0.06 + Math.random() * 0.14,  // offset below Iran coast, as fraction of H
      scale,
      type:  Math.random() < 0.6 ? 'tanker' : 'naval',
      alpha: 0.18 + scale * 0.30,
    });
  }
  for (let i = 0; i < 28; i++) {
    parallaxBuoys.push({
      wx:   Math.random() * WORLD_W,
      yOff: 0.04 + Math.random() * 0.22,
    });
  }
}

function _parallaxSX(wx) {
  // double-modulo: handles negative values correctly
  return ((wx - scrollX * PARALLAX_FACTOR) % W + W) % W;
}

function _drawPTanker() {
  X.fillStyle = '#0d2030';
  // Hull
  X.beginPath();
  X.moveTo(-40, 0); X.lineTo(-40, -8); X.lineTo(36, -8);
  X.lineTo(40, -4); X.lineTo(40, 0); X.closePath(); X.fill();
  // Superstructure
  X.fillRect(-10, -22, 22, 14);
  X.fillRect(-5, -28, 11, 6);
  // Funnel
  X.fillRect(1, -34, 5, 6);
  // Forward mast
  X.fillRect(30, -8, 2, -16);
}

function _drawPNaval() {
  X.fillStyle = '#112030';
  // Hull
  X.beginPath();
  X.moveTo(-35, 0); X.lineTo(-35, -6); X.lineTo(-28, -10);
  X.lineTo(30, -10); X.lineTo(35, -5); X.lineTo(35, 0); X.closePath(); X.fill();
  // Bridge
  X.fillRect(-14, -26, 18, 16);
  X.fillRect(-8, -34, 10, 8);
  // Gun mount
  X.fillRect(-26, -10, 8, -5);
  // Mast + radar arm
  X.fillRect(-4, -34, 2, -20);
  X.fillRect(-12, -54, 16, 2);
}

function drawParallaxLayer() {
  for (const ship of parallaxShips) {
    const sx = _parallaxSX(ship.wx);
    const sy = coastY(IRAN_PTS, ship.wx) + ship.yOff * H;

    X.save();
    X.globalAlpha = ship.alpha;
    X.translate(sx, sy);
    X.scale(ship.scale, ship.scale);
    ship.type === 'tanker' ? _drawPTanker() : _drawPNaval();
    X.restore();

    // Ghost copy for wrap-edge continuity
    if (sx < 90 * ship.scale) {
      X.save();
      X.globalAlpha = ship.alpha;
      X.translate(sx + W, sy);
      X.scale(ship.scale, ship.scale);
      ship.type === 'tanker' ? _drawPTanker() : _drawPNaval();
      X.restore();
    }
  }

  // Navigation buoys
  X.globalAlpha = 0.42;
  X.fillStyle = '#cc2200';
  for (const b of parallaxBuoys) {
    const sx = _parallaxSX(b.wx);
    const by = coastY(IRAN_PTS, b.wx) + b.yOff * H;
    X.beginPath(); X.arc(sx, by, 2, 0, Math.PI * 2); X.fill();
  }
  X.globalAlpha = 1;
}

// ── Radio Voice ───────────────────────────────────────────────────────────────
function radioBeep(ac, t, pitch, dur, vol){
  const o=ac.createOscillator(); o.type='sine'; o.frequency.value=pitch;
  const g=ac.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.012);
  g.gain.setValueAtTime(vol,t+dur-0.015);
  g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+dur+0.02);
}

function radioStatic(ac, t, dur, vol){
  const bufLen=Math.ceil(ac.sampleRate*dur);
  const buf=ac.createBuffer(1,bufLen,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource(); src.buffer=buf;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1600; bp.Q.value=0.8;
  const g=ac.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.03);
  g.gain.setValueAtTime(vol,t+dur-0.03);
  g.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(bp); bp.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t+dur+0.05);
}

function radioVoice(text) {
  if (!window.speechSynthesis) return;

  // cancel() clears any stale queue, then speak() immediately — both sync in gesture
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate   = 0.92;
  utt.pitch  = 1.0;
  utt.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v=>/en/i.test(v.lang)&&/(daniel|arthur|oliver|george|james)/i.test(v.name))
         || voices.find(v=>/en.*(GB|AU)/i.test(v.lang))
         || voices.find(v=>/en/i.test(v.lang));
  if (v) utt.voice = v;

  // Beeps via WebAudio — fire synchronously (no gesture restriction)
  utt.onstart = () => {
    try {
      const ac=getAC(); if(!ac) return;
      const t=ac.currentTime;
      radioStatic(ac, t, 0.12, 0.25);
      radioBeep(ac, t+0.08, 1000, 0.16, 0.30);
      radioBeep(ac, t+0.26, 1400, 0.12, 0.25);
    } catch(e) {}
  };
  utt.onend = () => {
    try {
      const ac=getAC(); if(!ac) return;
      const t=ac.currentTime;
      radioStatic(ac, t, 0.10, 0.20);
      radioBeep(ac, t+0.06, 1400, 0.10, 0.22);
      radioBeep(ac, t+0.18, 1000, 0.08, 0.18);
    } catch(e) {}
  };

  window.speechSynthesis.speak(utt);
}

function fireRadioIfPending() {
  if (!pendingRadioMsg) return;
  const msg = pendingRadioMsg;
  pendingRadioMsg = null;
  radioVoice(msg);
}

function spawnSlick(wx, y, big) {
  slicks.push({
    wx, y,
    rx: big ? 55 : 32,   // horizontal radius (expands over time)
    ry: big ? 18 : 10,   // vertical radius
    life: 1,
    maxLife: big ? 18 : 10,  // seconds before fully faded
    age: 0,
    hueShift: Math.random() * 360,
  });
}

function updateSlicks(dt) {
  slickPenalty = 0;
  for (let i = slicks.length - 1; i >= 0; i--) {
    const s = slicks[i];
    s.age += dt;
    s.life = Math.max(0, 1 - s.age / s.maxLife);
    // Slick expands as it spreads
    const expand = 1 + s.age * (s.age < 4 ? 3.5 : 0.4);
    s._rx = s.rx * expand;
    s._ry = s.ry * (1 + s.age * 0.5);
    if (s.life <= 0) { slicks.splice(i, 1); continue; }

    // Check player overlap — ellipse point-in-ellipse test
    const dx = (player.wx - s.wx) / s._rx;
    const dy = (player.y  - s.y)  / s._ry;
    if (dx*dx + dy*dy < 1) {
      // Penalty proportional to how deep inside the ellipse
      const depth = 1 - Math.sqrt(dx*dx + dy*dy);
      slickPenalty = Math.min(1, slickPenalty + depth * s.life * 0.85);
    }
  }
  // Smooth penalty so it doesn't snap
  slickPenalty = Math.min(slickPenalty, 0.55); // hard cap: max 55% slowdown
}

function drawSlicks() {
  const t = Date.now() / 1000;
  for (const s of slicks) {
    const sx = s.wx - scrollX;
    if (sx < -s._rx - 20 || sx > W + s._rx + 20) continue;

    X.save();
    X.translate(sx, s.y);
    X.scale(1, s._ry / s._rx); // squash to ellipse

    // Layered iridescent rings
    const layers = 5;
    for (let k = 0; k < layers; k++) {
      const r = s._rx * (0.3 + k * 0.16);
      const hue = (s.hueShift + k * 38 + t * 28) % 360;
      const a = s.life * (0.22 - k * 0.028);
      X.beginPath();
      X.arc(0, 0, r, 0, Math.PI * 2);
      X.fillStyle = `hsla(${hue},80%,55%,${a})`;
      X.fill();
    }

    // Dark oil centre
    X.beginPath();
    X.arc(0, 0, s._rx * 0.28, 0, Math.PI * 2);
    X.fillStyle = `rgba(5,12,20,${s.life * 0.45})`;
    X.fill();

    X.restore();
  }
}


let AC=null, engineOsc=null, engineGn=null;
function getAC() {
  try {
    if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if (AC.state==='suspended') AC.resume();
  } catch(e){}
  return AC;
}
function noise(dur, freq, vol, type) {
  try {
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type=type||'lowpass'; f.frequency.value=freq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(t); src.stop(t+dur+.05);
  } catch(e){}
}
function tone(freq, dur, vol, type) {
  try {
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const o=ac.createOscillator(); o.type=type||'sine'; o.frequency.value=freq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+dur+.05);
  } catch(e){}
}
function sndBoom(big) { noise(.45,big?520:320,big?1.6:.9); tone(big?58:90,.3,big?1.1:.6); }
function sndCannon()  { noise(.18,280,.9,'highpass'); }
function sndHit()     {
  tone(440,.16,.4,'square');
  try {
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const o=ac.createOscillator(); o.type='square'; o.frequency.value=440;
    const g=ac.createGain();
    g.gain.setValueAtTime(.4,t); g.gain.setValueAtTime(0,t+.08);
    g.gain.setValueAtTime(.35,t+.15); g.gain.setValueAtTime(0,t+.20);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.22);
  } catch(e){}
}
function sndFlare()   { noise(.32,1800,.7,'bandpass'); }
function sndPickup()  {
  [523,659,784].forEach((f,i)=>{
    try {
      const ac=getAC(); if(!ac) return; const t=ac.currentTime+i*.07;
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=ac.createGain(); g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.3,t+.02);
      g.gain.exponentialRampToValueAtTime(.001,t+.18);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.2);
    } catch(e){}
  });
}
function startEngine() {
  try {
    if (engineOsc) return;
    const ac=getAC(); if(!ac) return;
    engineOsc=ac.createOscillator(); engineOsc.type='sawtooth'; engineOsc.frequency.value=42;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=90;
    engineGn=ac.createGain(); engineGn.gain.value=.07;
    engineOsc.connect(lp); lp.connect(engineGn); engineGn.connect(ac.destination);
    engineOsc.start();
  } catch(e){}
}
function stopEngine() {
  try { if(engineOsc){engineOsc.stop();engineOsc=null;engineGn=null;} } catch(e){}
}
function setEnginePitch(zone) {
  try {
    if(!engineOsc||!engineGn) return;
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const p={GULF:42,STRAIT:52,CHOKE:68,OMAN:44}[zone]||42;
    const v={GULF:.07,STRAIT:.10,CHOKE:.14,OMAN:.07}[zone]||.07;
    engineOsc.frequency.setTargetAtTime(p,t,1.5);
    engineGn.gain.setTargetAtTime(v,t,1.5);
  } catch(e){}
}

// ── Ambient Sound System ──────────────────────────────────────────────────────
let ambientWaveNode=null, ambientWaveGn=null;
let ambientWindNode=null, ambientWindGn=null;
let ambientGullTimer=0;

function startAmbient() {
  try {
    const ac=getAC(); if(!ac) return;
    if(ambientWaveNode) return; // already running

    // ── Ocean waves: pink-ish noise through a slow LFO-modulated lowpass ──
    const bufLen = ac.sampleRate * 4; // 4s looping buffer
    const waveBuf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const wd = waveBuf.getChannelData(0);
    // Generate noise with pink-ish rolloff (accumulate then normalise)
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for(let i=0;i<bufLen;i++){
      const wh = Math.random()*2-1;
      b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
      b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
      b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
      wd[i]=(b0+b1+b2+b3+b4+b5+wh*0.5362)*0.11;
    }
    ambientWaveNode = ac.createBufferSource();
    ambientWaveNode.buffer = waveBuf;
    ambientWaveNode.loop = true;

    // Lowpass to keep it rumbling, not hissy
    const wlp = ac.createBiquadFilter();
    wlp.type='lowpass'; wlp.frequency.value=420; wlp.Q.value=0.7;

    // Slow LFO on gain — wave surge rhythm ~0.18Hz
    const waveLFO = ac.createOscillator();
    waveLFO.frequency.value = 0.18;
    const waveLFOGn = ac.createGain();
    waveLFOGn.gain.value = 0.018; // LFO depth
    const waveLFOBase = ac.createGain();
    waveLFOBase.gain.value = 0.055; // base wave volume

    waveLFO.connect(waveLFOGn);
    waveLFOGn.connect(waveLFOBase.gain);

    ambientWaveGn = waveLFOBase;
    ambientWaveNode.connect(wlp);
    wlp.connect(ambientWaveGn);
    ambientWaveGn.connect(ac.destination);
    ambientWaveNode.start();
    waveLFO.start();

    // ── Light wind: high-passed noise, very quiet ──
    const windBuf = ac.createBuffer(1, ac.sampleRate*3, ac.sampleRate);
    const wnd = windBuf.getChannelData(0);
    for(let i=0;i<wnd.length;i++) wnd[i]=(Math.random()*2-1)*0.3;
    ambientWindNode = ac.createBufferSource();
    ambientWindNode.buffer = windBuf;
    ambientWindNode.loop = true;
    const whp = ac.createBiquadFilter();
    whp.type='bandpass'; whp.frequency.value=900; whp.Q.value=0.4;
    ambientWindGn = ac.createGain();
    ambientWindGn.gain.value = 0.022;
    ambientWindNode.connect(whp); whp.connect(ambientWindGn);
    ambientWindGn.connect(ac.destination);
    ambientWindNode.start();

    ambientGullTimer = 8 + Math.random()*12; // first gull in 8-20s
  } catch(e){}
}

function stopAmbient() {
  try { if(ambientWaveNode){ambientWaveNode.stop();ambientWaveNode=null;ambientWaveGn=null;} } catch(e){}
  try { if(ambientWindNode){ambientWindNode.stop();ambientWindNode=null;ambientWindGn=null;} } catch(e){}
}

function sndSeagull() {
  // Real gull: sawtooth (harmonic richness) + bandpass filter + simple pitch glide
  // "kee-yow" shape — fast rise, slow fall, no FM
  try {
    const ac=getAC(); if(!ac) return;
    const calls = 1 + Math.floor(Math.random()*3); // 1-3 cries per visit

    for(let c=0;c<calls;c++){
      const ct = ac.currentTime + c * (0.55 + Math.random()*0.25);
      const pitch = 780 + Math.random()*180; // vary between gulls

      // Tone: sawtooth for harmonic content
      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      // Pitch envelope: quick rise ("kee") then fall ("yow")
      osc.frequency.setValueAtTime(pitch * 0.72, ct);
      osc.frequency.linearRampToValueAtTime(pitch, ct + 0.08);
      osc.frequency.linearRampToValueAtTime(pitch * 0.62, ct + 0.38);

      // Bandpass to cut harsh highs and mud — centre ~1.1kHz, moderate Q
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1100;
      bp.Q.value = 1.8;

      // Noise layer — gives the raspy breathiness of a real gull
      const nBuf = ac.createBuffer(1, ac.sampleRate * 0.45, ac.sampleRate);
      const nd = nBuf.getChannelData(0);
      for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
      const nSrc = ac.createBufferSource(); nSrc.buffer = nBuf;
      const nbp = ac.createBiquadFilter();
      nbp.type = 'bandpass'; nbp.frequency.value = 1400; nbp.Q.value = 2.2;
      const nGn = ac.createGain(); nGn.gain.value = 0.09;

      // Master gain envelope — attack 40ms, sustain, release 120ms
      const g = ac.createGain();
      g.gain.setValueAtTime(0, ct);
      g.gain.linearRampToValueAtTime(0.13, ct + 0.04);
      g.gain.setValueAtTime(0.11, ct + 0.20);
      g.gain.exponentialRampToValueAtTime(0.001, ct + 0.42);

      // Short room decay — single delay tap, no feedback
      const dly = ac.createDelay(0.25);
      dly.delayTime.value = 0.09;
      const dlyGn = ac.createGain(); dlyGn.gain.value = 0.14;

      osc.connect(bp); bp.connect(g);
      nSrc.connect(nbp); nbp.connect(nGn); nGn.connect(g);
      g.connect(ac.destination);
      g.connect(dly); dly.connect(dlyGn); dlyGn.connect(ac.destination);

      osc.start(ct); osc.stop(ct + 0.45);
      nSrc.start(ct); nSrc.stop(ct + 0.45);
    }
  } catch(e){}
}

function updateAmbient(dt) {
  if(!ambientWaveNode) return;
  // Gull timer
  ambientGullTimer -= dt;
  if(ambientGullTimer <= 0){
    sndSeagull();
    ambientGullTimer = 14 + Math.random()*22; // next gull in 14-36s
  }
  // Fade wave volume with zone — quieter in CHOKE (more enclosed)
  try {
    if(ambientWaveGn){
      const ac=getAC(); if(!ac) return;
      const zv={GULF:0.055,STRAIT:0.042,CHOKE:0.028,OMAN:0.06}[zoneCurrent]||0.05;
      ambientWaveGn.gain.setTargetAtTime(zv, ac.currentTime, 2.5);
    }
    if(ambientWindGn){
      const ac=getAC(); if(!ac) return;
      const wv={GULF:0.022,STRAIT:0.030,CHOKE:0.038,OMAN:0.018}[zoneCurrent]||0.022;
      ambientWindGn.gain.setTargetAtTime(wv, ac.currentTime, 3.0);
    }
  } catch(e){}
}


let shake=null, shakeLastMs=0;
function startShake(type,amp) {
  if (shake && shake.amp>=amp && shake.t<shake.dur*.6) return;
  shake={type,t:0,dur:type==='snap'?.14:type==='roll'?.72:.38,amp};
  shakeLastMs=Date.now();
}
function calcShake() {
  if (!shake) return [0,0];
  const dt=Math.min((Date.now()-shakeLastMs)/1000,.05);
  shakeLastMs=Date.now(); shake.t+=dt;
  if (shake.t>=shake.dur) { shake=null; return [0,0]; }
  const p=shake.t/shake.dur;
  if (shake.type==='snap') {
    const e=Math.pow(1-p,2.5);
    return [Math.sin(shake.t*280)*shake.amp*e, Math.cos(shake.t*260)*shake.amp*.5*e];
  } else if (shake.type==='roll') {
    const e=Math.sin(p*Math.PI);
    return [Math.sin(shake.t*38)*shake.amp*e, Math.sin(shake.t*29+1.1)*shake.amp*.6*e];
  } else {
    const e=Math.pow(1-p,1.2), f=55+(1-p)*80;
    return [Math.sin(shake.t*f)*shake.amp*e, -Math.abs(Math.sin(shake.t*f*.7))*shake.amp*.7*e];
  }
}

const OIL_BASE=82, TICKER_GOAL=10;
let oilPrice,oilTarget,tickerItems;
const HEADLINES=[
  'Brent crude: $OIL/bbl','IRGC patrol near Qeshm Island',
  'US 5th Fleet on high alert','Hormuz — 21% of global oil transits',
  "Lloyd's raises war-risk premiums",'WTI crude: $OIL/bbl',
  'TSS traffic scheme in effect','IRGCN exercises ongoing',
  'Shipping war-risk up 40%','Gulf oil flow: 18-21m bbl/day',
];
function initTicker() {
  oilPrice=OIL_BASE; oilTarget=OIL_BASE;
  // Measure widths before placing so spacing is accurate from frame 1
  const tmp=document.createElement('canvas').getContext('2d');
  tmp.font=`bold 11px Courier New`;
  let xPos=W+40;
  tickerItems=HEADLINES.map(h=>{
    const label=h+'   ◆   ';
    const w=Math.ceil(tmp.measureText(label).width);
    const item={text:h,x:xPos,w};
    xPos+=w+60;
    return item;
  });
}
function oilShock(d) { oilTarget=Math.min(oilTarget+d*rnd(.2,.35),190); }
function oilCalm(a)  { oilTarget=Math.max(OIL_BASE,oilTarget-a); }
function updateTicker(dt) {
  oilPrice+=(oilTarget-oilPrice)*Math.min(dt*1.4,1);
  oilTarget+=(OIL_BASE-oilTarget)*dt*.08;
  const spd=58+(oilPrice-OIL_BASE)*.4;
  for(let i=tickerItems.length-1;i>=0;i--){
    const item=tickerItems[i];
    item.x-=spd*dt;
    if(item.x<-(item.w||600)){
      if(item.breaking){
        tickerItems.splice(i,1);
      } else {
        // Place after rightmost item using its actual measured width
        const rightmost=tickerItems.reduce((a,b)=>b.x>a.x?b:a,{x:-9999,w:0});
        item.x=rightmost.x+(rightmost.w||600)+60;
        item.text=HEADLINES[rndI(0,HEADLINES.length)];
        item.w=0;
      }
    }
  }
}

function injectBreaking(text) {
  if(!tickerItems||!tickerItems.length) return;
  if(tickerItems.filter(t=>t.breaking).length>=2) return;
  const label='  ◆ BREAKING: '+text+'  ◆  ';
  // Measure now so spacing is correct from frame 1
  const tmp=document.createElement('canvas').getContext('2d');
  tmp.font='bold 11px Courier New';
  const w=Math.ceil(tmp.measureText(label).width);
  const rightmost=tickerItems.reduce((a,b)=>b.x>a.x?b:a,{x:W,w:0});
  tickerItems.push({text:label, x:rightmost.x+(rightmost.w||600)+60, w, breaking:true});
}

// Wrap text into lines fitting pixel width
function wrapText(text, maxW, font) {
  X.font = font;
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (X.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

function drawBriefing() {
  briefingT += 0.016;
  const n = Date.now() / 1000;
  const b = activeBriefing;
  const pad = Math.max(W * 0.05, 18);
  const colW = W - pad * 2;

  // ── White page background ──────────────────────────────────────────────────
  X.fillStyle = '#f4f1eb'; X.fillRect(0, 0, W, H);

  // ── Red classification banner top ─────────────────────────────────────────
  const bannerH = Math.max(28, H * 0.048);
  X.fillStyle = '#cc0000'; X.fillRect(0, 0, W, bannerH);
  X.fillStyle = '#fff';
  X.font = `bold ${Math.min(bannerH * 0.58, 15)}px Courier New`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(b.clf, W/2, bannerH/2);

  let y = bannerH + Math.max(14, H * 0.022);

  // ── Source / header line ──────────────────────────────────────────────────
  X.textAlign = 'left'; X.textBaseline = 'alphabetic';
  X.fillStyle = '#555';
  const srcFs = Math.min(H * 0.022, 13);
  X.font = `${srcFs}px Courier New`;
  X.fillText(`SOURCE: ${b.src}`, pad, y);
  y += srcFs + 4;

  // Thin rule
  X.strokeStyle = '#999'; X.lineWidth = 0.8;
  X.beginPath(); X.moveTo(pad, y); X.lineTo(W - pad, y); X.stroke();
  y += Math.max(10, H * 0.016);

  // ── Headline ──────────────────────────────────────────────────────────────
  const hlFs = Math.min(H * 0.042, W * 0.055, 26);
  X.font = `bold ${hlFs}px Georgia, serif`;
  X.fillStyle = '#111';
  const hlLines = wrapText(b.headline, colW, `bold ${hlFs}px Georgia, serif`);
  hlLines.forEach(l => { X.fillText(l, pad, y); y += hlFs + 4; });
  y += Math.max(8, H * 0.012);

  // Thick rule under headline
  X.strokeStyle = '#111'; X.lineWidth = 2;
  X.beginPath(); X.moveTo(pad, y); X.lineTo(W - pad, y); X.stroke();
  y += Math.max(12, H * 0.018);

  // ── Body text — typewriter reveal ─────────────────────────────────────────
  const bodyFs = Math.min(H * 0.032, W * 0.042, 20);
  const bodyFont = `${bodyFs}px Georgia, serif`;
  const lh = bodyFs * 1.55;
  const fullText = b.body;
  const charsToShow = Math.min(fullText.length, Math.floor(briefingT * 75));
  const revealed = fullText.slice(0, charsToShow);
  const bodyLines = wrapText(revealed, colW, bodyFont);

  X.font = bodyFont;
  X.fillStyle = '#222';
  bodyLines.forEach(l => { X.fillText(l, pad, y); y += lh; });

  // Blinking cursor while typing
  if (charsToShow < fullText.length) {
    const cursorX = pad + X.measureText(bodyLines[bodyLines.length-1]||'').width + 2;
    const cursorY = y - lh;
    if ((n*3|0)%2) {
      X.fillStyle = '#333';
      X.fillRect(cursorX, cursorY - bodyFs + 3, Math.max(6, bodyFs*0.45), bodyFs - 2);
    }
  }

  // ── Effect box — appears when text is done ────────────────────────────────
  if (charsToShow >= fullText.length) {
    y += Math.max(10, H * 0.014);
    const efFs = Math.min(H * 0.028, 17);
    const efPad = Math.max(10, W * 0.03);
    const efH = efFs * 3.2;

    // Yellow alert box
    X.fillStyle = '#fff3cd';
    X.strokeStyle = '#e6a817'; X.lineWidth = 2;
    X.beginPath();
    X.roundRect ? X.roundRect(pad, y, colW, efH, 4)
                : (X.rect(pad, y, colW, efH));
    X.fill(); X.stroke();

    X.fillStyle = '#7a4800';
    X.font = `bold ${efFs * 0.75}px Courier New`;
    X.textBaseline = 'middle';
    X.fillText('ASSESSED EFFECT ON NEXT TRANSIT', pad + efPad, y + efH * 0.28);

    X.fillStyle = '#333';
    X.font = `bold ${efFs}px Courier New`;
    X.fillText(b.effect, pad + efPad, y + efH * 0.72);
    X.textBaseline = 'alphabetic';
    y += efH + Math.max(14, H * 0.02);

    // Tap prompt
    const tap = 0.6 + Math.sin(n * 3.5) * 0.4;
    X.fillStyle = `rgba(0,80,160,${tap})`;
    X.font = `bold ${Math.min(H * 0.036, 22)}px Courier New`;
    X.textAlign = 'center';
    X.fillText('▶  TAP TO BEGIN NEXT CROSSING  ◀', W/2, Math.min(y + 10, H - bannerH - 12));
    X.textAlign = 'left';
  }

  // ── Red classification banner bottom ──────────────────────────────────────
  X.fillStyle = '#cc0000'; X.fillRect(0, H - bannerH, W, bannerH);
  X.fillStyle = '#fff';
  X.font = `bold ${Math.min(bannerH * 0.58, 15)}px Courier New`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(b.clf, W/2, H - bannerH/2);

  X.textAlign = 'left'; X.textBaseline = 'alphabetic';
}

function fireCannon(sx,sy) {

  cannonShells.push({wx:player.wx+PL_W/2+4,y:player.y,vx:dx/d*520,vy:dy/d*520,dist:0,maxDist:580});

function mkEnemy(type,wx,y) {
  const e={type,wx,y,timer:0};
  if(type==='speedboat'){e.vx=rnd(-45,-90);e.shootT=rnd(1.5,3.5);e.w=22;e.h=9;}
  else if(type==='drone'){
    // Shahed-136: delta-wing kamikaze — fixed heading toward player at spawn, no homing
    const dx=player.wx-wx, dy=player.y-y, d=Math.hypot(dx,dy)||1;
    const spd=100+wave*10+(spawnMod.droneSpeedBonus||0);
    e.vx=(dx/d)*spd + rnd(-20,0); // slight leftward bias
    e.vy=(dy/d)*spd;
    e.angle=Math.atan2(dy,dx);
    e.w=22;e.h=14;
  }
  else if(type==='mine'){e.vx=0;e.vy=0;e.w=20;e.h=20;}
  else{
    // Missile: Shahab/Fateh — spawns high above screen, parabolic dive
    e.vx=rnd(-155,-210);
    e.vy=rnd(-30,20);
    e.gravity=rnd(95,155)*(spawnMod.missileGravity||1);
    e.y=-H*rnd(0.25,0.45);
    e.targetY=y;
    e.warn=true;
    e.w=28;e.h=8;
  }
  enemies.push(e);
}
function spawnWave() {
  const fwx=player.wx+W*.78+rnd(80,320);

  const zone=getZone(fwx); if(zone==='CHOKE') return;

  // Base config per zone
  const cfg={
    GULF: {pool:['speedboat','speedboat','mine'],n:[1,3],pu:.50},
    STRAIT:{pool:['speedboat','drone','mine','missile'],n:[2,5],pu:.35},
    OMAN: {pool:['speedboat','drone'],n:[1,3],pu:.45},
  }[zone]||{pool:['speedboat'],n:[1,2],pu:.3};

  // Apply spawn modifiers
  const pool = [...cfg.pool];
  let nMin = cfg.n[0], nMax = cfg.n[1];
  let puRate = cfg.pu;

  if (spawnMod.mineWeight && zone !== 'OMAN') {
    for (let k=0;k<Math.round(spawnMod.mineWeight-1);k++) pool.push('mine');
  }
  if (spawnMod.noMinesInGulf && zone==='GULF') {
    const filtered = pool.filter(t=>t!=='mine');
    if (filtered.length) pool.length=0, pool.push(...filtered);
  }
  if (spawnMod.droneWeight) {
    for (let k=0;k<Math.round(spawnMod.droneWeight-1);k++) pool.push('drone');
  }
  if (spawnMod.boatCountBonus) { nMin+=1; nMax+=spawnMod.boatCountBonus; }
  if (spawnMod.globalSpawnMult) { nMin=Math.round(nMin*spawnMod.globalSpawnMult); nMax=Math.round(nMax*spawnMod.globalSpawnMult); }
  if (spawnMod.pickupRate) puRate = Math.min(0.9, puRate * spawnMod.pickupRate);
  if (spawnMod.repairBias) puRate = Math.min(0.85, puRate * 1.5);
  if (spawnMod.spawnIntervalMult) puRate = Math.min(0.9, puRate * 1.1); // slightly more pickups on calm runs

  for(let i=0;i<rndI(nMin,nMax+1);i++){
    const wx=fwx+i*rnd(90,220);
    const iY=coastY(IRAN_PTS,wx),oY=coastY(OMAN_PTS,wx);
    const type=pool[rndI(0,pool.length)];
    const y=type==='mine'?rnd(iY+35,oY-35):rnd(iY+12,iY+H*.18);
    mkEnemy(type,wx,Math.max(iY+12,Math.min(oY-12,y)));
  }

  // Escort pickup bias
  const escortChance = spawnMod.escortSpawnBonus ? puRate * (1 + spawnMod.escortSpawnBonus) : puRate;
  if(Math.random() < (spawnMod.repairBias ? puRate : escortChance)){
    const px=fwx+120,iY=coastY(IRAN_PTS,px),oY=coastY(OMAN_PTS,px);
    // Repair bias: 60% repair, 20% flare, 20% escort
    const types = spawnMod.repairBias
      ? ['repair','repair','repair','flare','escort']
      : spawnMod.escortSpawnBonus
        ? ['repair','flare','escort','escort']
        : ['repair','flare','escort'];
    pickups.push({wx:px,y:rnd(iY+45,oY-45),type:types[rndI(0,types.length)],pulse:0});
  }
}
function spawnChokeSwarm() {
  const bwx=player.wx+W*.6;
  for(let i=0;i<5;i++){
    const wx=bwx+i*rnd(110,190);
    mkEnemy('speedboat',wx,coastY(IRAN_PTS,wx)+rnd(8,30));
    mkEnemy('drone',wx+rnd(40,100),coastY(OMAN_PTS,wx)-rnd(8,35));
  }
  for(let i=0;i<2;i++){const wx=bwx+rnd(300,600);mkEnemy('missile',wx,coastY(IRAN_PTS,wx)+20);}
  const px=bwx+W*.8,iY=coastY(IRAN_PTS,px),oY=coastY(OMAN_PTS,px);
  pickups.push({wx:px,y:(iY+oY)/2,type:'repair',pulse:0});
}
function spawnFinalSalvo() {
  const bwx=player.wx+W*.85;
  const count = 4 + (spawnMod.salvoBonus||0);
  for(let i=0;i<count;i++){const wx=bwx+i*rnd(180,300);mkEnemy('missile',wx,coastY(IRAN_PTS,wx)+15);}
}

function spawnIRGCSwarm() {
  // 4-5 boats spawn in a loose forward arc, converge on player over ~8s
  const count = 4 + (Math.random()<0.4?1:0) + (spawnMod.boatCountBonus||0);
  const bwx = player.wx + W*0.65;
  const iY=coastY(IRAN_PTS,bwx), oY=coastY(OMAN_PTS,bwx);
  const ch=oY-iY;
  for(let i=0;i<count;i++){
    const frac=i/(count-1); // 0..1 spread across channel
    const wx=bwx + rnd(40,140) + i*rnd(60,110);
    const y=iY + ch*(0.12 + frac*0.72); // spread from near-Iran to near-Oman
    const e={type:'speedboat',wx,y,timer:0,
      vx:rnd(-55,-80),
      shootT:rnd(2.5,5),
      w:22,h:9,
      swarm:true,       // flag — these boats home in
      swarmT:0,         // age counter
      swarmDur:8+rnd(0,3), // seconds until full convergence
    };
    enemies.push(e);
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
let prevT=0;
function update(ts) {
  const dt=Math.min((ts-prevT)/1000,.05); prevT=ts;
  if (gs!=='PLAY') return;

  gTime+=dt; score+=dt*12;

  // TSS lane bonus — outbound lane is 18–42% of channel depth
  if(zoneCurrent==='STRAIT'||zoneCurrent==='CHOKE'){
    const tIy=coastY(IRAN_PTS,player.wx), tOy=coastY(OMAN_PTS,player.wx);
    const ch=tOy-tIy, relY=(player.y-tIy)/ch;
    const inLane = relY>=0.18 && relY<=0.42;
    if(inLane) score+=dt*6; // +6pts/s bonus for lane compliance
    // AIS warning — throttled to once per 12s to avoid ticker spam
    if(!inLane && (zoneCurrent==='STRAIT'||zoneCurrent==='CHOKE')){
      if(!player.aisWarnCooldown) player.aisWarnCooldown=0;
      player.aisWarnCooldown-=dt;
      if(player.aisWarnCooldown<=0){
        injectBreaking('AIS ALERT: Vessel deviation from TSS outbound lane — UKMTO notified');
        player.aisWarnCooldown=12;
      }
    }
  }
  if(hitFlash>0)    hitFlash-=dt*3;
  if(muzzleFlash>0) muzzleFlash-=dt*8;
  if(player.cannonCool>0) player.cannonCool-=dt;
  if(aimIndicator){aimIndicator.life-=dt*2.2;if(aimIndicator.life<=0)aimIndicator=null;}

  scrollX+=(62+wave*4)*dt*(1-slickPenalty*0.55); player.wx=scrollX+W*.25;
  if(scrollX+W>=WORLD_W){
    finalScore=Math.round(score+hull*14);
    crossings++; saveCrossings(); stopEngine(); stopAmbient();
    const msgs = [
      `Vessel, this is Fifth Fleet, Gulf of Oman. You are clear of the strait. All threats are astern. You are in safe international waters. Proceed full steam ahead. Well done, Captain. Out.`,
      `All stations, UKMTO Dubai. Transit of Hormuz corridor is complete. Vessel is clear of restricted zones. Masters are advised to resume normal passage. Safe voyage. Out.`,
      `Captain, this is Coalition Maritime Force. Outstanding. You made it through. Gulf of Oman is open water. Cargo status confirmed secure. Proceed on your heading. Bon voyage. Out.`,
      `This is Fifth Fleet. Hormuz transit confirmed complete. Iranian waters are clear astern. You have open sea ahead. The oil flows. Good work out there. Out.`,
      `Vessel, Fifth Fleet Bahrain. Strait of Hormuz is behind you. You are free to proceed at full speed. UKMTO has you on screen. Safe passage. Out.`,
    ];
    pendingRadioMsg = msgs[(crossings-1) % msgs.length];
    selectBriefing();
    gs='WIN'; return;
  }

  // Player — momentum-based steering (VLCC inertia)
  const iY=coastY(IRAN_PTS,player.wx),oY=coastY(OMAN_PTS,player.wx);
  let tgt=touchY!==null?touchY:player.y;
  if(keys['ArrowUp']||keys['KeyW'])   tgt=player.y-120;
  if(keys['ArrowDown']||keys['KeyS']) tgt=player.y+120;
  // Acceleration toward target, heavy damping — supertanker feel
  const maxVy  = 95 * (1 - slickPenalty * 0.6);
  const tgtVy  = Math.max(-maxVy, Math.min(maxVy, (tgt - player.y) * 2.8));
  const inertia = 1.8 * (1 - slickPenalty * 0.4); // lower = more sluggish
  player.vy += (tgtVy - player.vy) * Math.min(inertia * dt, 1);
  player.y  += player.vy * dt;
  player.y=Math.max(iY+PL_H/2+4,Math.min(oY-PL_H/2-4,player.y));
  for(const isl of ISLANDS){
    if(Math.abs(player.wx-isl[0])<isl[2]+PL_W*.55&&Math.abs(player.y-isl[1]*H)<isl[3]*H+PL_H*.55)
      player.y=isl[1]*H+isl[3]*H+PL_H*.55+2;
  }
  if(player.iframes>0) player.iframes-=dt;
  if(player.escort>0)  player.escort-=dt;

  // Continuous leak — damaged tanker bleeds oil proportional to hull loss
  if(hull<100){
    player.leakTimer-=dt;
    if(player.leakTimer<=0){
      const leakRate=0.6+3.5*(1-hull/100); // 0.6s at full hull → 0.6s at 0 hull
      player.leakTimer=leakRate+rnd(0,0.4);
      if(hull<95) spawnSlick(player.wx+rnd(-18,8),player.y+rnd(-6,6),false);
    }
  }

  // Wake — V-shape trail: two diverging arms + centre foam
  const wakeAge = dt * 1.4;
  wakes.forEach(w=>{ w.l-=wakeAge; w.spread=(w.spread||0)+dt*28; });
  // Spawn new wake node each frame with spread seed
  wakes.push({wx:player.wx-PL_W/2+2, y:player.y, l:1, spread:0,
    vy: player.vy*0.12 }); // carry a little of the player's vertical drift
  if(wakes.length>80) wakes.shift();

  // Zone
  zonePrev=zoneCurrent; zoneCurrent=getZone(player.wx);
  if(zoneCurrent!==zonePrev){
    zoneBannerText={GULF:'PERSIAN GULF',STRAIT:'STRAIT OF HORMUZ',CHOKE:'⚠ HORMUZ CHOKEPOINT',OMAN:'GULF OF OMAN'}[zoneCurrent]||'';
    zoneBannerLife=2.8;
    if(zoneCurrent==='STRAIT'){
      oilShock(6);
      injectBreaking('Tanker transiting Strait of Hormuz — Brent crude $OIL/bbl and rising');
    }
    if(zoneCurrent==='CHOKE'){
      oilShock(18);
      injectBreaking('IRGCN vessels shadowing commercial traffic in Hormuz chokepoint — war-risk premiums surge');
    }
    if(zoneCurrent==='OMAN'){
      oilCalm(8);
      injectBreaking('Vessel reports clear passage into Gulf of Oman — threat level reduced');
    }
  }
  if(zoneBannerLife>0) zoneBannerLife-=dt;
  setEnginePitch(zoneCurrent);

  // Scripted
  if(!chokeDone&&player.wx>=Z_CHOKE_S+60){
    chokeDone=true; spawnChokeSwarm(); startShake('roll',6);
    injectBreaking('Tanker under attack in Strait of Hormuz — Brent crude surges to $OIL/bbl');
  }
  if(!salvoDone&&player.wx>=Z_SALVO){
    salvoDone=true; spawnFinalSalvo();
    zoneBannerText='⚠ FINAL APPROACH — MISSILES INBOUND'; zoneBannerLife=3.2; oilShock(22);
    injectBreaking('MISSILE ALERT: Ballistic threat reported in final Hormuz approach corridor — markets in freefall');
  }

  // Wave & spawn
  waveTimer+=dt; if(waveTimer>13*(spawnMod.waveSlow?1.5:1)){wave++;waveTimer=0;}
  // IRGC swarm — fires once per ~30s in STRAIT/CHOKE independently of normal waves
  if(!player.swarmTimer) player.swarmTimer=28+rnd(0,10);
  if(zoneCurrent==='STRAIT'||zoneCurrent==='CHOKE'){
    player.swarmTimer-=dt;
    if(player.swarmTimer<=0){
      spawnIRGCSwarm();
      player.swarmTimer=28+rnd(0,12);
      injectBreaking('IRGCN fast-attack craft swarm intercepting outbound tanker');
    }
  }
  spawnTimer-=dt;
  if(spawnTimer<=0){
    spawnWave();
    const iv={GULF:[4.5,7.5],STRAIT:[2.2,4.0],CHOKE:[8,12],OMAN:[4.0,6.5]}[zoneCurrent]||[3,5];
    const mult=spawnMod.spawnIntervalMult||1;
    spawnTimer=rnd(iv[0],iv[1])*mult;
  }

  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i]; e.timer+=dt;
    if(e.wx-scrollX<-200){enemies.splice(i,1);continue;}
    // Missiles falling below screen without hitting — remove
    if(e.type==='missile'&&e.y>H+80){enemies.splice(i,1);continue;}
    if(e.type==='drone'){
      if(e.seeking && !e.diverted){
        const ddx=player.wx-e.wx, ddy=player.y-e.y, dd=Math.hypot(ddx,ddy)||1;
        const spd=Math.hypot(e.vx,e.vy)||100;
        e.vx+=(ddx/dd*spd-e.vx)*0.06;
        e.vy+=(ddy/dd*spd-e.vy)*0.06;
        e.angle=Math.atan2(e.vy,e.vx);
      } else if(e.diverted){
        e.vx*=0.995; e.vy*=0.995;
      }
      e.wx+=e.vx*dt; e.y+=e.vy*dt;
      // Flyover shake — drone passing close
      if(Math.abs(e.wx-player.wx)<60&&Math.abs(e.y-player.y)<55){
        startShake('snap',3);
      }
    } else if(e.type==='missile'){
      // Parabolic dive: constant forward speed, gravity-driven descent
      e.wx+=e.vx*dt; e.vy+=e.gravity*dt; e.y+=e.vy*dt;
      // Once it enters the water channel, stop warning
      if(e.y>=coastY(IRAN_PTS,e.wx)) e.warn=false;
    } else if(e.type==='speedboat'){
      if(e.swarm){
        // Swarm phase: blend from arc drift into direct pursuit over swarmDur seconds
        e.swarmT+=dt;
        const t=Math.min(e.swarmT/e.swarmDur,1); // 0=arc drift, 1=full pursuit
        // Arc drift component
        e.wx+=e.vx*dt;
        e.y+=Math.sin(e.timer*2.4)*38*(1-t)*dt;
        // Pursuit component — steer toward player Y
        const dyP=player.y-e.y;
        e.y+=dyP*t*1.8*dt;
        // Once converged, behave like normal speedboat
        if(t>=1){ e.swarm=false; }
      } else {
        e.wx+=e.vx*dt; e.y+=Math.sin(e.timer*2.4)*38*dt;
      }
      const fireRate = spawnMod.boatFireRate || 1;
      if((e.shootT-=dt*fireRate)<=0){
        const reactTime = spawnMod.boatReactTime || 1;
        e.shootT=rnd(2,4.5)*reactTime;
        const dx=player.wx-e.wx,dy=player.y-e.y,d=Math.hypot(dx,dy)||1,spd=195+wave*14;
        bullets.push({wx:e.wx,y:e.y,vx:dx/d*spd,vy:dy/d*spd,foe:true});
      }
    }
    if(player.escort>0&&e.type!=='mine'){
      const dx=e.wx-player.wx;
      if(dx>0&&dx<360&&rnd(0,1)<dt*2.2){
        const d=Math.hypot(dx,e.y-player.y)||1;
        bullets.push({wx:player.wx+28,y:player.y-38,vx:dx/d*290,vy:(e.y-player.y)/d*290,foe:false});
      }
    }
    if(player.iframes<=0){
      const hw=((e.w||20)+PL_W)*.5-4,hh=((e.h||20)+PL_H)*.5-4;
      if(Math.abs(e.wx-player.wx)<hw&&Math.abs(e.y-player.y)<hh){
        const dmg=e.type==='missile'?35:e.type==='mine'?42:15;
        hull-=dmg; player.iframes=1.8; hitFlash=.8; oilShock(dmg);
        spawnSlick(player.wx, player.y, true);
        if(e.type==='missile'){startShake('roll',11);injectBreaking('Tanker struck by ballistic missile in Hormuz corridor — Brent crude $OIL/bbl');}
        else if(e.type==='mine'){startShake('thud',14);injectBreaking('Mine strike reported in Hormuz TSS — UKMTO issues navigation warning');}
        else startShake('snap',7);
        sndHit(); boom(e.wx,e.y); enemies.splice(i,1);
        if(hull<=0){hull=0;finalScore=Math.round(score);stopEngine();stopAmbient();gs='DEAD';return;}
        continue;
      }
    }
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.wx+=b.vx*dt; b.y+=b.vy*dt;
    const sx=b.wx-scrollX;
    if(sx<-50||sx>W+50||b.y<0||b.y>H){bullets.splice(i,1);continue;}
    if(!b.foe){
      let hit=false;
      for(let j=enemies.length-1;j>=0;j--){
        if(Math.abs(b.wx-enemies[j].wx)<22&&Math.abs(b.y-enemies[j].y)<20){
          boom(enemies[j].wx,enemies[j].y,.65);score+=55;enemies.splice(j,1);bullets.splice(i,1);hit=true;break;
        }
      }
      if(hit) continue;
    } else if(player.iframes<=0){
      if(Math.abs(b.wx-player.wx)<PL_W/2+5&&Math.abs(b.y-player.y)<PL_H/2+5){
        hull-=10;player.iframes=.7;hitFlash=.6;oilShock(10);startShake('snap',5);sndHit();
        spawnSlick(player.wx, player.y, false);
        boom(b.wx,b.y,.4);bullets.splice(i,1);
        if(hull<=0){hull=0;finalScore=Math.round(score);stopEngine();stopAmbient();gs='DEAD';return;}
        continue;
      }
      // Near-miss — bullet passes within 28px without hitting
      const nearDx=Math.abs(b.wx-player.wx), nearDy=Math.abs(b.y-player.y);
      if(nearDx<28&&nearDy<28&&nearDx>PL_W/2+5){
        startShake('snap',2.5);
      }
    }
  }

  // Cannon shells
  for(let i=cannonShells.length-1;i>=0;i--){
    const s=cannonShells[i];
    s.wx+=s.vx*dt;s.y+=s.vy*dt;s.dist+=Math.hypot(s.vx,s.vy)*dt;
    if(s.wx-scrollX<-40||s.wx-scrollX>W+40||s.y<0||s.y>H||s.dist>s.maxDist){
      if(s.dist>=s.maxDist) boom(s.wx,s.y,.4);
      cannonShells.splice(i,1);continue;
    }
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      if(Math.hypot(s.wx-enemies[j].wx,s.y-enemies[j].y)<(enemies[j].type==='mine'?18:16)){
        boom(enemies[j].wx,enemies[j].y,enemies[j].type==='missile'?1.1:.75);
        if(enemies[j].type==='speedboat'||enemies[j].type==='mine') spawnSlick(enemies[j].wx,enemies[j].y,enemies[j].type==='mine');
        score+=enemies[j].type==='missile'?110:enemies[j].type==='mine'?90:70;
        enemies.splice(j,1);cannonShells.splice(i,1);hit=true;break;
      }
    }
    if(hit) continue;
  }

  // Pickups
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i]; p.pulse+=dt*3.2;
    if(p.wx-scrollX<-65){pickups.splice(i,1);continue;}
    if(Math.abs(p.wx-player.wx)<38&&Math.abs(p.y-player.y)<32){
      if(p.type==='repair'){hull=Math.min(hull+24,100);oilCalm(4);}
      else if(p.type==='flare') player.flares=Math.min(player.flares+2,6);
      else player.escort=13+(spawnMod.escortDuration||0);
      sndPickup();score+=45;boom(p.wx,p.y,.35);pickups.splice(i,1);
    }
  }

  // Explosions
  for(let i=exps.length-1;i>=0;i--){
    const e=exps[i];
    e.r+=4*dt*60*.016;e.a-=.033;
    e.pct.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.l-=.028;});
    e.debris.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vx*=.91;d.vy*=.91;d.l-=.022;});
    e.smoke.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.r+=.9;s.l-=.018;});
    if(e.a<=0) exps.splice(i,1);
  }

  updateSlicks(dt);

  // Fire particles
  if(hull<=40&&rnd(0,1)<(hull<=15?.45:.18)){
    fireParticles.push({x:player.wx+rnd(-22,18),y:player.y+rnd(-8,8),
      vx:rnd(-.3,.3)*60,vy:rnd(-60,-100),r:rnd(3,7),l:1,smoke:Math.random()<.5});
  }
  for(let i=fireParticles.length-1;i>=0;i--){
    const p=fireParticles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy*=.97;p.l-=dt*(p.smoke?1.1:1.8);
    if(p.l<=0) fireParticles.splice(i,1);
  }

  updateTicker(dt);
  updateAmbient(dt);
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawBg() {
  const zone=zoneCurrent||'GULF';
  const cols={GULF:['#091C38','#0C2548'],STRAIT:['#0F1830','#1A1830'],CHOKE:['#1A0E20','#240E18'],OMAN:['#091C30','#0C2238']};
  const [tc,bc]=cols[zone]||cols.GULF;
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,tc);g.addColorStop(1,bc);
  X.fillStyle=g;X.fillRect(0,0,W,H);
  if(zone==='CHOKE'||zone==='STRAIT'){
    const vg=X.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.9);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(140,10,10,${zone==='CHOKE'?.22:.10})`);
    X.fillStyle=vg;X.fillRect(0,0,W,H);
  }
  drawParallaxLayer();

  // ── Dynamic water — two parallax wave layers + deep shimmer ──────────────
  const n=Date.now()/1000;
  const iYw=coastY(IRAN_PTS,player.wx), oYw=coastY(OMAN_PTS,player.wx);
  const waterTop=iYw, waterBot=oYw;

  // Layer 1 — slow deep swells (scroll at 30% of world speed)
  const ox1=(scrollX*0.30)%W;
  X.strokeStyle='rgba(30,90,160,0.18)'; X.lineWidth=1.2;
  for(let row=0;row<14;row++){
    const baseY=waterTop+(waterBot-waterTop)*row/13;
    X.beginPath();
    for(let x=-ox1-40;x<W+40;x+=4){
      const wx=x+scrollX*0.30;
      const sy=baseY
        + Math.sin(wx*0.008 + n*0.7)*6
        + Math.sin(wx*0.014 + n*0.5 + row)*3;
      x===-Math.floor(ox1)-40?X.moveTo(x,sy):X.lineTo(x,sy);
    }
    X.stroke();
  }

  // Layer 2 — fast surface chop (scroll at 70% of world speed)
  const ox2=(scrollX*0.70)%W;
  X.strokeStyle='rgba(80,160,230,0.09)'; X.lineWidth=0.7;
  for(let row=0;row<22;row++){
    const baseY=waterTop+(waterBot-waterTop)*row/21;
    X.beginPath();
    for(let x=-ox2-20;x<W+20;x+=3){
      const wx=x+scrollX*0.70;
      const sy=baseY
        + Math.sin(wx*0.022 + n*1.4 + row*0.6)*2.5
        + Math.cos(wx*0.031 + n*1.1)*1.5;
      x===-Math.floor(ox2)-20?X.moveTo(x,sy):X.lineTo(x,sy);
    }
    X.stroke();
  }

  // Glint layer — sparse bright highlights that drift across
  X.fillStyle='rgba(160,210,255,0.12)';
  for(let g=0;g<8;g++){
    const gx=((scrollX*0.5 + g*137.5 + Math.sin(n*0.3+g)*80) % (W+80)) - 40;
    const gy=waterTop+(waterBot-waterTop)*(0.15+g*0.09+Math.sin(n*0.4+g)*0.06);
    const gr=Math.abs(Math.sin(n*0.8+g*2.1));
    X.beginPath(); X.ellipse(gx,gy,14*gr+4,2.5,0,0,Math.PI*2); X.fill();
  }
  const iY=coastY(IRAN_PTS,player.wx),oY=coastY(OMAN_PTS,player.wx);
  X.setLineDash([18,14]);X.strokeStyle='rgba(255,215,80,.16)';X.lineWidth=1.2;
  X.beginPath();X.moveTo(0,iY+(oY-iY)*.62);X.lineTo(W,iY+(oY-iY)*.62);X.stroke();
  X.setLineDash([]);

  // ── TSS lanes — only visible in STRAIT and CHOKE zones ───────────────────
  if(zone==='STRAIT'||zone==='CHOKE'){
    // Outbound (player's lane): upper third of channel — dashed white
    // Inbound: lower third — dashed amber. Separation zone between them.
    // Historically: outbound NE lane sits roughly 30% down, inbound 65% down
    const tssSteps=40;
    const x0s=scrollX-80, x1s=scrollX+W+80;
    X.lineWidth=1.4;

    // Outbound lane boundaries (player should be here heading east)
    X.setLineDash([14,10]);
    X.strokeStyle='rgba(180,220,255,0.28)'; // cool white — navigational
    X.beginPath();
    for(let i=0;i<=tssSteps;i++){
      const wx=x0s+(x1s-x0s)*i/tssSteps;
      const iy=coastY(IRAN_PTS,wx), oy=coastY(OMAN_PTS,wx);
      const sy=iy+(oy-iy)*0.18; // upper edge of outbound lane
      const sx2=wx-scrollX;
      i?X.lineTo(sx2,sy):X.moveTo(sx2,sy);
    }
    X.stroke();
    X.beginPath();
    for(let i=0;i<=tssSteps;i++){
      const wx=x0s+(x1s-x0s)*i/tssSteps;
      const iy=coastY(IRAN_PTS,wx), oy=coastY(OMAN_PTS,wx);
      const sy=iy+(oy-iy)*0.42; // lower edge of outbound / top of separation
      const sx2=wx-scrollX;
      i?X.lineTo(sx2,sy):X.moveTo(sx2,sy);
    }
    X.stroke();

    // Inbound lane boundaries
    X.strokeStyle='rgba(255,200,100,0.22)'; // amber — inbound traffic
    X.beginPath();
    for(let i=0;i<=tssSteps;i++){
      const wx=x0s+(x1s-x0s)*i/tssSteps;
      const iy=coastY(IRAN_PTS,wx), oy=coastY(OMAN_PTS,wx);
      const sy=iy+(oy-iy)*0.58;
      const sx2=wx-scrollX;
      i?X.lineTo(sx2,sy):X.moveTo(sx2,sy);
    }
    X.stroke();
    X.beginPath();
    for(let i=0;i<=tssSteps;i++){
      const wx=x0s+(x1s-x0s)*i/tssSteps;
      const iy=coastY(IRAN_PTS,wx), oy=coastY(OMAN_PTS,wx);
      const sy=iy+(oy-iy)*0.82;
      const sx2=wx-scrollX;
      i?X.lineTo(sx2,sy):X.moveTo(sx2,sy);
    }
    X.stroke();
    X.setLineDash([]);

    // Lane labels — faint
    X.fillStyle='rgba(180,220,255,0.18)';
    X.font=`${Math.min(H*.022,9)}px Courier New`;
    X.textAlign='left';X.textBaseline='middle';
    const midIy=coastY(IRAN_PTS,player.wx), midOy=coastY(OMAN_PTS,player.wx);
    X.fillText('OUTBOUND →',14,midIy+(midOy-midIy)*0.30);
    X.fillStyle='rgba(255,200,100,0.15)';
    X.fillText('← INBOUND',14,midIy+(midOy-midIy)*0.70);
  }
  const lbl={GULF:'PERSIAN GULF',STRAIT:'STRAIT OF HORMUZ',CHOKE:'HORMUZ CHOKEPOINT',OMAN:'GULF OF OMAN'}[zone]||'';
  X.fillStyle=zone==='CHOKE'?'rgba(255,80,60,.13)':'rgba(255,215,80,.10)';
  X.font=`${Math.min(H*.09,26)}px Courier New`;
  X.textAlign='center';X.textBaseline='middle';X.fillText(lbl,W/2,H/2);
  const prog=player.wx/WORLD_W;
  X.fillStyle='rgba(100,180,255,.35)';X.font=`${Math.min(H*.026,10)}px Courier New`;
  X.textAlign='right';X.fillText(`${(26.5-prog).toFixed(2)}°N  ${(56+prog*2).toFixed(2)}°E`,W-8,H-42);
  X.textAlign='left';X.textBaseline='alphabetic';
}

function drawCoast() {
  const N=100,x0=scrollX-120,x1=scrollX+W+120;
  function fill(pts,top){
    X.beginPath();
    for(let i=0;i<=N;i++){const wx=x0+(x1-x0)*i/N,sx=wx-scrollX,sy=coastY(pts,wx);i?X.lineTo(sx,sy):X.moveTo(sx,sy);}
    top?(X.lineTo(W+120,0),X.lineTo(-120,0)):(X.lineTo(W+120,H),X.lineTo(-120,H));
    X.closePath();
  }
  function stroke(pts){
    X.beginPath();
    for(let i=0;i<=N;i++){const wx=x0+(x1-x0)*i/N,sx=wx-scrollX,sy=coastY(pts,wx);i?X.lineTo(sx,sy):X.moveTo(sx,sy);}
    X.stroke();
  }
  fill(IRAN_PTS,true);
  const gI=X.createLinearGradient(0,0,0,H*.28);gI.addColorStop(0,'#A0876A');gI.addColorStop(1,'#7C6548');
  X.fillStyle=gI;X.fill();X.strokeStyle='#D4B87C';X.lineWidth=2.5;stroke(IRAN_PTS);
  fill(OMAN_PTS,false);
  const gO=X.createLinearGradient(0,H*.68,0,H);gO.addColorStop(0,'#7C6548');gO.addColorStop(1,'#A0876A');
  X.fillStyle=gO;X.fill();X.strokeStyle='#D4B87C';X.lineWidth=2.5;stroke(OMAN_PTS);
  X.font=`bold ${Math.min(H*.034,13)}px Courier New`;X.fillStyle='rgba(255,228,160,.78)';
  X.fillText('IRAN',8,coastY(IRAN_PTS,scrollX+90)-10);
  X.fillText('OMAN / UAE',8,coastY(OMAN_PTS,scrollX+90)+17);
}

function drawIslands(){
  for(const isl of ISLANDS){
    const sx=isl[0]-scrollX;if(sx<-isl[2]-60||sx>W+isl[2]+60) continue;
    const sy=isl[1]*H,rx=isl[2],ry=isl[3]*H;
    X.beginPath();X.ellipse(sx,sy,rx,ry,0,0,Math.PI*2);X.fillStyle='#7C6548';X.fill();
    X.strokeStyle='#D4B87C';X.lineWidth=1.5;X.stroke();
    X.strokeStyle='rgba(160,130,80,.5)';X.lineWidth=.8;
    X.beginPath();X.ellipse(sx,sy,rx*.7,ry*.7,0,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(255,225,150,.82)';X.font=`${Math.min(H*.024,9.5)}px Courier New`;
    X.textAlign='center';X.fillText(isl[4],sx,sy+ry+13);X.textAlign='left';
  }
}

function drawWakes(){
  for(const w of wakes){
    if(w.l<=0) continue;
    const sx=w.wx-scrollX;
    const spread=w.spread||0;
    const alpha=w.l*0.22;
    const foamAlpha=w.l*0.35;

    // Port arm (above)
    X.strokeStyle=`rgba(200,230,255,${alpha})`;
    X.lineWidth=Math.max(0.5, w.l*2.2);
    X.beginPath();
    X.moveTo(sx, w.y);
    X.lineTo(sx-spread*0.6, w.y-spread*0.55);
    X.stroke();

    // Starboard arm (below)
    X.beginPath();
    X.moveTo(sx, w.y);
    X.lineTo(sx-spread*0.6, w.y+spread*0.55);
    X.stroke();

    // Centre foam dots — random scatter along centre line
    if(w.l>0.15){
      const foamCount=Math.ceil(w.l*4);
      for(let i=0;i<foamCount;i++){
        const fx=sx - spread*0.6*(i/foamCount) + (Math.random()-0.5)*4;
        const fy=w.y + (w.vy||0)*i*0.4 + (Math.random()-0.5)*5;
        X.fillStyle=`rgba(220,240,255,${foamAlpha*(1-i/foamCount)})`;
        X.beginPath();
        X.arc(fx, fy, w.l*2.5*(1-i/foamCount*0.6), 0, Math.PI*2);
        X.fill();
      }
    }
  }
}

function drawPlayer(){
  const sx=player.wx-scrollX,sy=player.y;
  if(player.iframes>0&&(player.iframes*9|0)%2===0) return;
  const n=Date.now()/1000;

  X.save();
  X.translate(sx,sy);

  // Hull list — skew the canvas when critically damaged
  if(hull<25){
    const listAngle = (0.08 + Math.sin(n*0.9)*0.03) * (1-(hull/25));
    X.rotate(listAngle);
  }

  X.fillStyle='#2C3E50';X.beginPath();
  X.moveTo(PL_W/2,0);X.lineTo(PL_W/2-10,-PL_H/2);X.lineTo(-PL_W/2,-PL_H/2);
  X.lineTo(-PL_W/2,PL_H/2);X.lineTo(PL_W/2-10,PL_H/2);X.closePath();X.fill();

  // Hull damage tint — redden as damage mounts
  if(hull<50){
    const dmgAlpha=(1-hull/50)*0.35;
    X.fillStyle=`rgba(180,30,10,${dmgAlpha})`;X.beginPath();
    X.moveTo(PL_W/2,0);X.lineTo(PL_W/2-10,-PL_H/2);X.lineTo(-PL_W/2,-PL_H/2);
    X.lineTo(-PL_W/2,PL_H/2);X.lineTo(PL_W/2-10,PL_H/2);X.closePath();X.fill();
  }

  X.fillStyle='#3D5166';X.fillRect(-PL_W/2+4,-PL_H/2+3,PL_W-18,PL_H-6);
  X.fillStyle='#ECF0F1';X.fillRect(-PL_W/2+5,-PL_H/2+4,14,PL_H-8);
  X.fillStyle='#5D7D95';for(let i=0;i<4;i++) X.fillRect(-4+i*13,-PL_H/2+5,10,PL_H-10);
  X.fillStyle='rgba(255,200,0,.7)';
  X.beginPath();X.moveTo(PL_W/2,0);X.lineTo(PL_W/2-6,-5);X.lineTo(PL_W/2-6,5);X.closePath();X.fill();
  X.fillStyle='#95A5A6';X.beginPath();X.arc(4,0,5.5,0,Math.PI*2);X.fill();
  X.fillStyle='#BDC3C7';X.fillRect(4,-2.5,18,5);

  // On-hull fire and smoke — attached to ship, not floating free
  if(hull<50){
    const intensity=1-hull/50; // 0 at 50%, 1 at 0%
    const fireCount=Math.floor(2+intensity*4);
    for(let i=0;i<fireCount;i++){
      const fx=rnd(-PL_W/2+8, PL_W/2-14);
      const fy=rnd(-PL_H/2-8, PL_H/2+4);
      const phase=n*8+i*1.3;
      const flicker=0.6+Math.sin(phase)*0.4;
      // Smoke puff
      X.fillStyle=`rgba(45,40,35,${0.4*intensity*flicker})`;
      X.beginPath();X.arc(fx-2,fy-6,4+intensity*3,0,Math.PI*2);X.fill();
      // Flame
      const fc=hull<25?`rgba(255,80,10,${0.85*flicker})`:`rgba(255,160,20,${0.75*flicker})`;
      X.fillStyle=fc;
      X.beginPath();X.arc(fx,fy,2.5+intensity*2*flicker,0,Math.PI*2);X.fill();
    }
  }

  X.restore();

  if(muzzleFlash>0){
    const fsx=sx+PL_W/2+20,fa=muzzleFlash/.14;
    const fg=X.createRadialGradient(fsx,sy,0,fsx,sy,22);
    fg.addColorStop(0,'rgba(255,255,200,1)');fg.addColorStop(1,'rgba(255,140,0,0)');
    X.save();X.globalAlpha=fa*.9;X.fillStyle=fg;X.beginPath();X.arc(fsx,sy,22,0,Math.PI*2);X.fill();X.restore();
  }
  if(player.escort>0){
    X.save();X.translate(sx,sy-44);X.fillStyle='#1A5276';
    X.beginPath();X.moveTo(24,0);X.lineTo(18,-11);X.lineTo(-24,-11);X.lineTo(-24,11);X.lineTo(18,11);X.closePath();X.fill();
    X.fillStyle='#AED6F1';X.fillRect(22,-1.5,10,3);
    X.fillStyle='#ECF0F1';X.font='bold 7px Courier New';X.textAlign='center';X.textBaseline='middle';X.fillText('USN',0,0);
    X.restore();
  }
}

function drawEnemies(){
  const n=Date.now()/1000;
  for(const e of enemies){
    const sx=e.wx-scrollX;
    const skipRange=e.type==='missile'&&e.warn?W+320:70;
    if(sx<-70||sx>skipRange) continue;
    X.save();X.translate(sx,e.y);
    if(e.type==='speedboat'){
      X.fillStyle='#C0392B';X.beginPath();X.moveTo(-13,0);X.lineTo(13,-5.5);X.lineTo(13,5.5);X.closePath();X.fill();
      X.fillStyle='#1A6B15';X.fillRect(2,-13,9,7);X.fillStyle='#FFF';X.fillRect(2,-13,9,2);X.fillStyle='#C0392B';X.fillRect(2,-11,9,2);
      X.fillStyle='rgba(255,255,255,.22)';X.beginPath();X.ellipse(-16,0,8,2.5,0,0,Math.PI*2);X.fill();
    } else if(e.type==='drone'){
      // Shahed-136: swept delta wing, fixed dive angle
      X.rotate(e.angle||0);
      // Wing
      X.fillStyle='#8B0000';
      X.beginPath();
      X.moveTo(16,0);         // nose
      X.lineTo(-12,-18);      // left wingtip
      X.lineTo(-6,0);         // centre trailing
      X.lineTo(-12,18);       // right wingtip
      X.closePath(); X.fill();
      // Fuselage stripe
      X.fillStyle='#5C0000';X.fillRect(-12,-3,24,6);
      // Exhaust pulse
      const ef=0.4+Math.sin(n*22)*0.55;
      X.fillStyle=`rgba(255,130,0,${ef})`;X.beginPath();X.arc(-10,0,3.5,0,Math.PI*2);X.fill();
    } else if(e.type==='mine'){
      X.fillStyle='#717D7E';X.beginPath();X.arc(0,0,10,0,Math.PI*2);X.fill();
      X.strokeStyle='#AAB7B8';X.lineWidth=1.5;X.stroke();
      for(let k=0;k<8;k++){const a=k*Math.PI/4;X.beginPath();X.moveTo(Math.cos(a)*10,Math.sin(a)*10);X.lineTo(Math.cos(a)*17,Math.sin(a)*17);X.stroke();X.beginPath();X.arc(Math.cos(a)*17,Math.sin(a)*17,2.5,0,Math.PI*2);X.fillStyle='#E74C3C';X.fill();}
    } else {
      // Missile: draw at dive angle; show warning reticle while above channel
      if(e.warn){
        // Warning crosshair at impact X, clamped to top of screen
        const blink=(n*4|0)%2;
        if(blink){
          X.restore(); // undo translate so we can draw in screen coords
          const wsx=e.wx-scrollX;
          X.save();
          X.strokeStyle='rgba(255,40,40,0.85)';X.lineWidth=1.5;X.setLineDash([4,3]);
          X.beginPath();X.moveTo(wsx,0);X.lineTo(wsx,coastY(IRAN_PTS,e.wx));X.stroke();
          X.setLineDash([]);
          X.fillStyle='rgba(255,40,40,0.9)';
          X.font=`bold ${Math.min(H*.032,12)}px Courier New`;
          X.textAlign='center';X.textBaseline='top';
          X.fillText('▼ MISSILE',wsx,6);
          X.restore();
          X.save();X.translate(sx,e.y); // restore translate for consistency
        }
        // Don't draw the missile shape while above screen
        X.restore(); continue;
      }
      // Visible missile — orient along velocity vector
      const ang=Math.atan2(e.vy,e.vx);
      X.rotate(ang);
      X.fillStyle='#E67E22';X.beginPath();X.moveTo(15,0);X.lineTo(-12,-4.5);X.lineTo(-14,0);X.lineTo(-12,4.5);X.closePath();X.fill();
      X.fillStyle='#D35400';X.beginPath();X.moveTo(-12,-4.5);X.lineTo(-20,-10);X.lineTo(-14,0);X.closePath();X.fill();
      X.beginPath();X.moveTo(-12,4.5);X.lineTo(-20,10);X.lineTo(-14,0);X.closePath();X.fill();
      const fa=.45+Math.sin(n*30)*.5;
      X.fillStyle=`rgba(255,110,0,${fa})`;X.beginPath();X.moveTo(-14,0);X.lineTo(-24,-5.5);X.lineTo(-22,0);X.lineTo(-24,5.5);X.closePath();X.fill();
    }
    X.restore();
  }
}

function drawBullets(){
  for(const b of bullets){
    const sx=b.wx-scrollX;
    X.fillStyle=b.foe?'#E74C3C':'#3498DB';X.beginPath();X.arc(sx,b.y,4,0,Math.PI*2);X.fill();
  }
}

function drawCannonShells(){
  for(const s of cannonShells){
    const sx=s.wx-scrollX,tx=sx-s.vx*.06,ty=s.y-s.vy*.06;
    const tg=X.createLinearGradient(tx,ty,sx,s.y);
    tg.addColorStop(0,'rgba(255,255,180,0)');tg.addColorStop(1,'rgba(255,240,100,.85)');
    X.strokeStyle=tg;X.lineWidth=3.5;X.beginPath();X.moveTo(tx,ty);X.lineTo(sx,s.y);X.stroke();
    X.fillStyle='#FFF5AA';X.beginPath();X.arc(sx,s.y,4.5,0,Math.PI*2);X.fill();

function drawAimIndicator(){
  if(!aimIndicator||aimIndicator.life<=0) return;
  const {sx,sy,life}=aimIndicator,a=Math.min(1,life*2.5),r=14*(1-life*.5);
  X.save();X.globalAlpha=a;X.strokeStyle='rgba(255,240,80,.9)';X.lineWidth=2;
  X.beginPath();X.arc(sx,sy,r,0,Math.PI*2);X.stroke();
  X.strokeStyle='rgba(255,240,80,.7)';X.lineWidth=1.5;
  [[sx-10,sy,sx-r+3,sy],[sx+10,sy,sx+r-3,sy],[sx,sy-10,sx,sy-r+3],[sx,sy+10,sx,sy+r-3]].forEach(([x1,y1,x2,y2])=>{X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();});
  X.restore();
}

function drawPickups(){
  const n=Date.now()/1000;
  for(const p of pickups){
    const sx=p.wx-scrollX;if(sx<-60||sx>W+60) continue;
    const col=p.type==='repair'?'#2ECC71':p.type==='flare'?'#F39C12':'#3498DB';
    const pulse=Math.sin(n*3.8)*4;
    X.strokeStyle=col;X.lineWidth=2.5;X.beginPath();X.arc(sx,p.y,15+pulse,0,Math.PI*2);X.stroke();
    X.fillStyle=col+'66';X.beginPath();X.arc(sx,p.y,13,0,Math.PI*2);X.fill();
    X.fillStyle='#FFF';X.font='13px serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText({repair:'⚕',flare:'✦',escort:'⚓'}[p.type],sx,p.y);
    X.textAlign='left';X.textBaseline='alphabetic';
  }
}

function drawFireParticles(){
  for(const p of fireParticles){
    const sx=p.x-scrollX;
    if(p.smoke){X.fillStyle=`rgba(60,55,50,${p.l*.55})`;X.beginPath();X.arc(sx,p.y,p.r*(2-p.l),0,Math.PI*2);X.fill();}
    else{X.fillStyle=p.l>.5?`rgba(255,200,40,${p.l*.92})`:`rgba(220,80,20,${p.l*.85})`;X.beginPath();X.arc(sx,p.y,p.r*p.l,0,Math.PI*2);X.fill();}
  }
}

function drawExplosions(){
  for(const e of exps){
    const sx=e.wx-scrollX;
    e.smoke.forEach(s=>{if(s.l>0){X.fillStyle=`rgba(80,75,70,${s.l*.55})`;X.beginPath();X.arc(sx+s.x,e.y+s.y,s.r,0,Math.PI*2);X.fill();}});
    X.strokeStyle=`rgba(255,130,0,${e.a*.85})`;X.lineWidth=5*e.sc;X.beginPath();X.arc(sx,e.y,e.r,0,Math.PI*2);X.stroke();
    const cg=X.createRadialGradient(sx,e.y,0,sx,e.y,e.r*.6);
    cg.addColorStop(0,`rgba(255,255,180,${e.a*.8})`);cg.addColorStop(1,'rgba(255,160,20,0)');
    X.fillStyle=cg;X.beginPath();X.arc(sx,e.y,e.r*.6,0,Math.PI*2);X.fill();
    e.debris.forEach(d=>{if(d.l>0){X.strokeStyle=`rgba(180,140,60,${d.l*e.a})`;X.lineWidth=2.5*d.l;X.beginPath();X.moveTo(sx+d.x,e.y+d.y);X.lineTo(sx+d.x+Math.cos(d.ang+Math.PI)*d.len*d.l,e.y+d.y+Math.sin(d.ang+Math.PI)*d.len*d.l);X.stroke();}});
    e.pct.forEach(p=>{if(p.l>0){X.fillStyle=`rgba(${p.col?'255,255,255':'255,220,60'},${p.l*e.a})`;X.beginPath();X.arc(sx+p.x,e.y+p.y,2.8*p.l,0,Math.PI*2);X.fill();}});
  }
}

function drawRadar(){
  const n    = Date.now()/1000;
  const R    = Math.min(W*.10, 48);   // radar circle radius — scales with screen
  const cx   = W - R - 12;            // centre X: bottom-right
  const cy   = H - 38 - R - 10;       // centre Y: sit above bottom HUD bar
  const RANGE = 620;                   // world-px range ahead mapped to radar radius

  // ── Background ──────────────────────────────────────────────────────────────
  X.save();
  X.beginPath(); X.arc(cx, cy, R+2, 0, Math.PI*2);
  X.fillStyle='rgba(0,8,4,0.88)'; X.fill();
  X.strokeStyle='rgba(0,180,60,0.45)'; X.lineWidth=1.2; X.stroke();

  // Clip everything to circle
  X.beginPath(); X.arc(cx, cy, R, 0, Math.PI*2); X.clip();

  // Range rings
  X.strokeStyle='rgba(0,160,50,0.18)'; X.lineWidth=0.8;
  for(let k=1;k<=3;k++){
    X.beginPath(); X.arc(cx, cy, R*k/3, 0, Math.PI*2); X.stroke();
  }
  // Cross-hairs
  X.strokeStyle='rgba(0,160,50,0.14)'; X.lineWidth=0.7;
  X.beginPath(); X.moveTo(cx-R,cy); X.lineTo(cx+R,cy); X.stroke();
  X.beginPath(); X.moveTo(cx,cy-R); X.lineTo(cx,cy+R); X.stroke();

  // ── Sweep arm ───────────────────────────────────────────────────────────────
  // Rotates once per ~2.4s; right-side bias so it scans the threat sector first
  const sweepAng = (n * (Math.PI*2/2.4)) % (Math.PI*2);
  const grad = X.createConicalGradient
    ? X.createConicalGradient(sweepAng - Math.PI*0.55, cx, cy)   // if supported
    : null;

  // Fallback: paint a wedge manually (works everywhere)
  const wedgeSpan = Math.PI * 0.55;
  for(let i=0;i<18;i++){
    const a0 = sweepAng - wedgeSpan*(i/18);
    const a1 = sweepAng - wedgeSpan*((i+1)/18);
    const alpha = (1 - i/18) * 0.28;
    X.fillStyle = `rgba(0,220,70,${alpha})`;
    X.beginPath();
    X.moveTo(cx, cy);
    X.arc(cx, cy, R, a0, a1, true);
    X.closePath();
    X.fill();
  }
  // Leading edge line
  X.strokeStyle='rgba(0,255,80,0.75)'; X.lineWidth=1.2;
  X.beginPath();
  X.moveTo(cx, cy);
  X.lineTo(cx + Math.cos(sweepAng)*R, cy + Math.sin(sweepAng)*R);
  X.stroke();

  // ── Blips ────────────────────────────────────────────────────────────────────
  // Map: world dx (ahead = right = positive) → radar X offset
  //       world dy (below player = positive) → radar Y offset
  // Radar is oriented so forward = right on screen
  const blipCol = {speedboat:'#E74C3C', drone:'#E67E22', missile:'#FF4444', mine:'#AAB7B8'};
  const blipR   = {speedboat:2.5,       drone:2.5,        missile:3.2,       mine:2.0};

  for(const e of enemies){
    const dx = e.wx - player.wx;          // positive = ahead
    const dy = e.y  - player.y;           // positive = below
    if(dx < -80 || dx > RANGE) continue;  // only show ahead + slightly behind
    const rx = cx + (dx/RANGE)*R;
    const ry = cy + (dy/RANGE)*R;

    // Blip brightness: pulses when sweep arm passes over it
    const blipAng = Math.atan2(ry-cy, rx-cx);
    const angDiff = Math.abs(((blipAng - sweepAng + Math.PI*3) % (Math.PI*2)) - Math.PI);
    const lit = angDiff < 0.35 ? 1 : Math.max(0, 1 - angDiff*1.8);
    const alpha = 0.35 + lit*0.65;

    X.fillStyle = (blipCol[e.type]||'#FFF') + Math.round(alpha*255).toString(16).padStart(2,'0');
    X.beginPath();
    X.arc(rx, ry, blipR[e.type]||2.5, 0, Math.PI*2);
    X.fill();

    // Missile gets a small ring
    if(e.type==='missile'&&!e.warn){
      X.strokeStyle=`rgba(255,60,60,${alpha*0.7})`;
      X.lineWidth=1; X.beginPath(); X.arc(rx,ry,5,0,Math.PI*2); X.stroke();
    }
  }

  // Pickups — green diamonds
  for(const p of pickups){
    const dx = p.wx - player.wx;
    if(dx < 0 || dx > RANGE) continue;
    const dy = p.y - player.y;
    const rx = cx + (dx/RANGE)*R;
    const ry = cy + (dy/RANGE)*R;
    const col = p.type==='repair'?'#2ECC71':p.type==='flare'?'#F39C12':'#3498DB';
    X.fillStyle = col;
    X.save(); X.translate(rx,ry); X.rotate(Math.PI/4);
    X.fillRect(-2,-2,4,4);
    X.restore();
  }

  // Player dot — centre
  X.fillStyle='#00FF50';
  X.beginPath(); X.arc(cx, cy, 2.8, 0, Math.PI*2); X.fill();

  X.restore();

  // Label
  X.fillStyle='rgba(0,180,50,0.45)';
  X.font=`${Math.min(H*.022,8.5)}px Courier New`;
  X.textAlign='center'; X.textBaseline='top';
  X.fillText('RADAR', cx, cy+R+3);
  X.textAlign='left'; X.textBaseline='alphabetic';
}

function drawHUD(){
  const pad=9,fs=s=>Math.min(H*s*.1,s*42);
  X.fillStyle='rgba(0,6,18,.75)';X.fillRect(0,0,W,44);
  const bw=Math.min(155,W*.30);
  X.fillStyle='#0A1826';X.fillRect(pad,8,bw,22);
  X.fillStyle=hull>55?'#27AE60':hull>25?'#F39C12':'#E74C3C';X.fillRect(pad,8,hull/100*bw,22);
  X.strokeStyle='#1E3A5A';X.lineWidth=1;X.strokeRect(pad,8,bw,22);
  X.fillStyle='#FFF';X.font=`bold ${fs(.28)}px Courier New`;X.fillText(`HULL ${hull|0}%`,pad+5,24);
  X.fillStyle='#F1C40F';X.textAlign='center';X.font=`bold ${fs(.38)}px Courier New`;X.fillText(`SCORE: ${score|0}`,W/2,27);
  X.textAlign='right';
  X.fillStyle='#E74C3C';X.font=`bold ${fs(.28)}px Courier New`;X.fillText(`THREAT ${wave}`,W-pad,20);
  X.fillStyle='rgba(100,200,120,.85)';X.font=`${fs(.24)}px Courier New`;X.fillText(`CROSSINGS ${crossings}/${attempts}`,W-pad,37);

  X.fillStyle='rgba(0,6,18,.75)';X.fillRect(0,H-38,W,38);
  const prog=Math.min(scrollX/Math.max(WORLD_W-W,1),1),barW=(W-pad*2)*prog;
  const b1=pad+(W-pad*2)*.21,b2=pad+(W-pad*2)*.65;
  X.fillStyle='#0A1826';X.fillRect(pad,H-28,W-pad*2,13);
  X.fillStyle='#1A5276';X.fillRect(pad,H-28,Math.min(barW,b1-pad),13);
  X.fillStyle='#922B21';X.fillRect(b1,H-28,Math.max(0,Math.min(barW-(b1-pad),b2-b1)),13);
  X.fillStyle='#1A5276';X.fillRect(b2,H-28,Math.max(0,barW-(b2-pad)),13);
  X.fillStyle='#F1C40F';X.fillRect(pad+barW-1.5,H-33,3,23);
  X.strokeStyle='#1E3A5A';X.lineWidth=1;X.strokeRect(pad,H-28,W-pad*2,13);
  X.fillStyle='rgba(190,190,190,.65)';X.font=`${fs(.22)}px Courier New`;
  X.textAlign='left';X.fillText('PERSIAN GULF',pad+2,H-17);
  X.textAlign='center';X.fillText('STRAIT OF HORMUZ',W/2,H-17);
  X.textAlign='right';X.fillText('GULF OF OMAN',W-pad,H-17);

  const ssX=player.wx-scrollX,cf=player.cannonCool>0?player.cannonCool/.65:0;
  X.strokeStyle='rgba(255,255,100,.18)';X.lineWidth=3.5;X.beginPath();X.arc(ssX,player.y,24,-Math.PI/2,Math.PI*3/2);X.stroke();
  if(cf>0){X.strokeStyle=`rgba(220,60,60,${.55+cf*.3})`;X.lineWidth=3.5;X.beginPath();X.arc(ssX,player.y,24,-Math.PI/2,-Math.PI/2+cf*Math.PI*2);X.stroke();}
  else{const rp=.5+Math.sin(Date.now()/180)*.5;X.strokeStyle=`rgba(255,240,60,${rp*.7})`;X.lineWidth=3.5;X.beginPath();X.arc(ssX,player.y,24,-Math.PI/2,Math.PI*3/2);X.stroke();}

  X.fillStyle='#F39C12';X.textAlign='left';X.font=`${fs(.27)}px Courier New`;
  let fs2='FLARES ';for(let i=0;i<6;i++) fs2+=i<player.flares?'◆':'◇';X.fillText(fs2,pad,H-5);
  if(player.escort>0){X.fillStyle='#3498DB';X.textAlign='right';X.font=`${fs(.26)}px Courier New`;X.fillText(`⚓ ESCORT ${player.escort.toFixed(1)}s`,W-pad,H-5);}
  if(slickPenalty>0.08){
    const si=slickPenalty/0.55;
    X.fillStyle=`rgba(80,200,80,${0.7+si*0.3})`;
    X.textAlign='center';X.font=`bold ${fs(.26)}px Courier New`;
    X.fillText(`⚠ OIL SLICK  -${Math.round(si*55)}% SPEED`,W/2,H-5);
  }

  if(gTime<6){
    const a=Math.max(0,1-gTime/5.5);
    X.fillStyle=`rgba(255,255,255,${a*.7})`;X.font=`${fs(.26)}px Courier New`;
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('TAP TO SHOOT  •  DRAG TO STEER  •  DOUBLE-TAP = FLARES',W/2,H/2+45);
  }

  if(zoneBannerLife>0){
    const t=zoneBannerLife/2.8,a=t>.85?(1-t)/.15:t<.25?t/.25:1;
    const isAlert=zoneBannerText.includes('CHOKE')||zoneBannerText.includes('FINAL');
    const bfs=Math.min(W*.075,28);
    X.save();X.textAlign='center';X.textBaseline='middle';X.font=`bold ${bfs}px Courier New`;
    X.shadowColor=isAlert?'#FF0000':'#FFC000';X.shadowBlur=18*a;
    X.fillStyle=isAlert?`rgba(200,30,30,${a*.82})`:`rgba(255,210,60,${a*.90})`;
    X.fillText(zoneBannerText,W/2,H*.5-2);X.shadowBlur=0;X.restore();
  }

  if(hitFlash>0){X.fillStyle=`rgba(220,30,30,${hitFlash*.28})`;X.fillRect(0,0,W,H);}
  drawRadar();
  X.textAlign='left';X.textBaseline='alphabetic';
}

function drawTicker(){
  const ty=44,th=16;
  X.fillStyle='rgba(8,18,8,.92)';X.fillRect(0,ty,W,th);
  X.strokeStyle='rgba(180,140,0,.4)';X.lineWidth=.8;
  X.beginPath();X.moveTo(0,ty);X.lineTo(W,ty);X.stroke();
  X.beginPath();X.moveTo(0,ty+th);X.lineTo(W,ty+th);X.stroke();
  X.save();X.rect(0,ty,W,th);X.clip();
  X.font=`bold ${Math.min(th*.72,11)}px Courier New`;X.textBaseline='middle';
  const ratio=Math.min((oilPrice-OIL_BASE)/(190-OIL_BASE),1);
  const n=Date.now()/1000;
  for(const item of tickerItems){
    const label=item.text.replace('$OIL',`$${oilPrice.toFixed(2)}`);
    if(item.breaking){
      // Breaking: text is pre-formatted, width pre-measured
      if(!item.w) item.w=X.measureText(label).width;
      const flash=(n*3|0)%2;
      X.fillStyle=flash?'rgba(255,60,40,0.95)':'rgba(255,200,40,0.95)';
      X.fillText(label,item.x,ty+th/2);
    } else {
      const display=label+'   ◆   ';
      if(!item.w) item.w=X.measureText(display).width;
      const isPx=item.text.includes('$OIL');
      X.fillStyle=isPx?(ratio<.4?`rgb(${(ratio/.4*200)|0},${(200-ratio/.4*60)|0},40)`:`rgb(220,${(200-(ratio-.4)/.6*160)|0},20)`):'rgba(140,200,120,.75)';
      X.fillText(display,item.x,ty+th/2);
      if(isPx){
        X.fillStyle=oilPrice>OIL_BASE+2?'#E74C3C':oilPrice<OIL_BASE-1?'#2ECC71':'#AAA';
        X.fillText(oilPrice>OIL_BASE+2?' ▲':oilPrice<OIL_BASE-1?' ▼':' ─',item.x+item.w,ty+th/2);
      }
    }
  }
  X.restore();X.textBaseline='alphabetic';
}

function drawTitle(){
  titleT+=.014;const n=Date.now()/1000;
  const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#020A18');g.addColorStop(1,'#051228');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  X.strokeStyle='rgba(0,80,180,.06)';X.lineWidth=2;
  for(let i=0;i<24;i++){const y=(i*H/24+n*14)%H;X.beginPath();X.moveTo(0,y+Math.sin(n*.7+i)*3);X.lineTo(W,y+Math.cos(n*.55+i*1.2)*3);X.stroke();}
  X.save();X.translate(W/2-60,H*.78);
  X.fillStyle='rgba(20,40,70,.85)';X.beginPath();X.moveTo(130,0);X.lineTo(118,-17);X.lineTo(-130,-17);X.lineTo(-130,17);X.lineTo(118,17);X.closePath();X.fill();
  X.fillStyle='rgba(50,80,110,.7)';for(let i=0;i<5;i++) X.fillRect(-90+i*33,-17,25,12);X.restore();
  X.textAlign='center';X.textBaseline='middle';
  X.shadowColor='#C0392B';X.shadowBlur=28;X.fillStyle='#E74C3C';
  X.font=`bold ${Math.min(W*.115,54)}px Courier New`;X.fillText('HORMUZ RUN',W/2,H*.27);X.shadowBlur=0;
  X.fillStyle='#F1C40F';X.font=`${Math.min(W*.044,16)}px Courier New`;
  X.fillText("Navigate your oil tanker through the world's",W/2,H*.40);
  X.fillText("most dangerous shipping lane",W/2,H*.40+21);
  X.fillStyle='rgba(200,200,200,.72)';X.font=`${Math.min(W*.033,12)}px Courier New`;
  X.fillText('⛵ Speedboats  ✈ Drones  🚀 Missiles  💣 Mines',W/2,H*.51);
  X.fillText('Pick up: ⚕ Repairs  ✦ Flares  ⚓ USN Escort',W/2,H*.57);
  X.fillText('TAP to shoot  •  DRAG to steer  •  DOUBLE-TAP for flares',W/2,H*.63);
  const p=.72+Math.sin(titleT*5)*.28;
  X.fillStyle=`rgba(241,196,15,${p})`;X.font=`bold ${Math.min(W*.055,21)}px Courier New`;
  X.fillText('▶  TAP TO BEGIN  ◀',W/2,H*.72);
  X.fillStyle='rgba(120,160,200,.5)';X.font=`${Math.min(W*.027,10)}px Courier New`;
  X.fillText('Strait of Hormuz — 21% of global oil supply',W/2,H*.92);
  if(attempts>0){
    X.fillStyle=crossings>=TICKER_GOAL?'rgba(100,230,100,.8)':'rgba(100,200,130,.65)';
    X.fillText(`Successful crossings: ${crossings} / ${attempts} attempts`,W/2,H*.86);
  }
  X.textAlign='left';X.textBaseline='alphabetic';
}

function drawEnd(win){
  X.fillStyle='rgba(0,0,0,.82)';X.fillRect(0,0,W,H);
  X.textAlign='center';X.textBaseline='middle';const fz=Math.min(W*.1,42);
  if(win){
    X.shadowColor='#2ECC71';X.shadowBlur=22;X.fillStyle='#2ECC71';X.font=`bold ${fz}px Courier New`;
    X.fillText('CARGO DELIVERED!',W/2,H*.25);X.shadowBlur=0;
    X.fillStyle='#ECF0F1';X.font=`${Math.min(W*.042,16)}px Courier New`;
    X.fillText('You made it through the Strait of Hormuz!',W/2,H*.38);
    X.fillText('The oil flows. The markets hold.',W/2,H*.45);
  } else {
    X.shadowColor='#E74C3C';X.shadowBlur=22;X.fillStyle='#E74C3C';X.font=`bold ${fz}px Courier New`;
    X.fillText('TANKER SUNK',W/2,H*.25);X.shadowBlur=0;
    X.fillStyle='#ECF0F1';X.font=`${Math.min(W*.042,16)}px Courier New`;
    X.fillText('Hull integrity lost. Oil spill in progress.',W/2,H*.38);
    X.fillText("Lloyd's of London is not happy.",W/2,H*.45);
  }
  X.fillStyle='#F1C40F';X.font=`bold ${Math.min(W*.065,28)}px Courier New`;X.fillText(`SCORE: ${finalScore}`,W/2,H*.55);
  X.fillStyle=crossings>=TICKER_GOAL?'#2ECC71':'rgba(100,210,130,.9)';
  X.font=`bold ${Math.min(W*.052,22)}px Courier New`;X.fillText(`CROSSINGS: ${crossings} / ${attempts} ATTEMPTS`,W/2,H*.63);
  if(crossings>=TICKER_GOAL){X.fillStyle='#F1C40F';X.font=`${Math.min(W*.036,14)}px Courier New`;X.fillText('★  TARGET ACHIEVED  ★',W/2,H*.69);}
  const or=Math.min((oilPrice-OIL_BASE)/(190-OIL_BASE),1);
  X.fillStyle=or<.35?'#2ECC71':or<.65?'#F39C12':'#E74C3C';
  X.font=`${Math.min(W*.038,14)}px Courier New`;X.fillText(`OIL CLOSED AT $${oilPrice.toFixed(2)}/bbl`,W/2,H*.76);
  const pa=.65+Math.sin(Date.now()/380)*.35;
  X.fillStyle=`rgba(255,255,255,${pa})`;X.font=`${Math.min(W*.05,19)}px Courier New`;
  X.fillText(win?'▶  TAP FOR INTEL BRIEFING  ◀':'TAP TO PLAY AGAIN',W/2,H*.86);
  if(win){
    X.fillStyle=`rgba(0,200,80,${pa*.7})`;X.font=`${Math.min(W*.03,11)}px Courier New`;
    X.fillText('📻  Radio message playing...',W/2,H*.92);
  }
  X.textAlign='left';X.textBaseline='alphabetic';
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(ts) {
  update(ts);
  if (gs==='TITLE') {
    drawTitle();
  } else if (gs==='PLAY') {
    const [sx0,sy0]=calcShake();
    X.save();X.translate(sx0,sy0);
    drawBg();drawCoast();drawIslands();drawWakes();drawSlicks();
    drawFireParticles();drawExplosions();drawPickups();
    drawBullets();drawCannonShells();drawAimIndicator();
    drawEnemies();drawPlayer();
    X.restore();
    drawHUD();drawTicker();
  } else if (gs==='BRIEFING') {
    drawBriefing();
  } else if (gs==='DEAD') {
    drawBg();drawCoast();drawIslands();drawEnd(false);
  } else if (gs==='WIN') {
    drawBg();drawCoast();drawIslands();drawEnd(true);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{prevT=ts;requestAnimationFrame(loop);});
</script>
