<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HORMUZ RUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────────────
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ── Geography ─────────────────────────────────────────────────────────────────
const WORLD_W = 7000;
const IRAN_PTS = [[0,.09],[400,.10],[700,.12],[1000,.14],[1300,.15],
  [1600,.17],[1900,.19],[2100,.21],[2400,.22],[2700,.23],
  [3000,.25],[3300,.24],[3600,.22],[3900,.19],
  [4200,.16],[4600,.13],[5100,.11],[6000,.10],[7000,.09]];
const OMAN_PTS = [[0,.91],[500,.89],[900,.87],[1200,.84],[1500,.80],
  [1800,.76],[2000,.71],[2300,.67],[2600,.65],[2900,.68],
  [3200,.73],[3600,.78],[4000,.83],[4400,.87],
  [5000,.90],[6000,.91],[7000,.91]];
const ISLANDS = [
  [1150,.34,24,.038,'Greater Tunb'],
  [1380,.38,18,.030,'Lesser Tunb'],
  [2150,.33,100,.038,'Qeshm Island'],
  [2950,.39,24,.034,'Larak'],
  [3050,.30,26,.042,'Hormuz Is.'],
];
function coastY(pts, wx) {
  if (wx <= pts[0][0]) return pts[0][1]*H;
  if (wx >= pts[pts.length-1][0]) return pts[pts.length-1][1]*H;
  for (let i=0;i<pts.length-1;i++) {
    if (wx >= pts[i][0] && wx < pts[i+1][0]) {
      let t = (wx-pts[i][0])/(pts[i+1][0]-pts[i][0]);
      t = t*t*(3-2*t);
      return (pts[i][1]+t*(pts[i+1][1]-pts[i][1]))*H;
    }
  }
  return pts[pts.length-1][1]*H;
}

// ── Zones ─────────────────────────────────────────────────────────────────────
const Z_GULF_END=1470, Z_CHOKE_S=2700, Z_CHOKE_E=3400, Z_STRAIT_END=4550, Z_SALVO=5800;
function getZone(wx) {
  if (wx < Z_GULF_END)   return 'GULF';
  if (wx < Z_STRAIT_END) return (wx>=Z_CHOKE_S&&wx<=Z_CHOKE_E)?'CHOKE':'STRAIT';
  return 'OMAN';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const rnd  = (a,b) => a+Math.random()*(b-a);
const rndI = (a,b) => 0|rnd(a,b);
let PL_W=68, PL_H=20, PL_VERT=125;

// ── Audio ─────────────────────────────────────────────────────────────────────
let AC=null, engineOsc=null, engineGn=null;
function getAC() {
  try {
    if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if (AC.state==='suspended') AC.resume();
  } catch(e){}
  return AC;
}
function noise(dur, freq, vol, type) {
  try {
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type=type||'lowpass'; f.frequency.value=freq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(t); src.stop(t+dur+.05);
  } catch(e){}
}
function tone(freq, dur, vol, type) {
  try {
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const o=ac.createOscillator(); o.type=type||'sine'; o.frequency.value=freq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+dur+.05);
  } catch(e){}
}
function sndBoom(big) { noise(.45,big?520:320,big?1.6:.9); tone(big?58:90,.3,big?1.1:.6); }
function sndCannon()  { noise(.18,280,.9,'highpass'); }
function sndHit()     {
  tone(440,.16,.4,'square');
  try {
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const o=ac.createOscillator(); o.type='square'; o.frequency.value=440;
    const g=ac.createGain();
    g.gain.setValueAtTime(.4,t); g.gain.setValueAtTime(0,t+.08);
    g.gain.setValueAtTime(.35,t+.15); g.gain.setValueAtTime(0,t+.20);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.22);
  } catch(e){}
}
function sndFlare()   { noise(.32,1800,.7,'bandpass'); }
function sndPickup()  {
  [523,659,784].forEach((f,i)=>{
    try {
      const ac=getAC(); if(!ac) return; const t=ac.currentTime+i*.07;
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=ac.createGain(); g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.3,t+.02);
      g.gain.exponentialRampToValueAtTime(.001,t+.18);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.2);
    } catch(e){}
  });
}
function startEngine() {
  try {
    if (engineOsc) return;
    const ac=getAC(); if(!ac) return;
    engineOsc=ac.createOscillator(); engineOsc.type='sawtooth'; engineOsc.frequency.value=42;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=90;
    engineGn=ac.createGain(); engineGn.gain.value=.07;
    engineOsc.connect(lp); lp.connect(engineGn); engineGn.connect(ac.destination);
    engineOsc.start();
  } catch(e){}
}
function stopEngine() {
  try { if(engineOsc){engineOsc.stop();engineOsc=null;engineGn=null;} } catch(e){}
}
function setEnginePitch(zone) {
  try {
    if(!engineOsc||!engineGn) return;
    const ac=getAC(); if(!ac) return; const t=ac.currentTime;
    const p={GULF:42,STRAIT:52,CHOKE:68,OMAN:44}[zone]||42;
    const v={GULF:.07,STRAIT:.10,CHOKE:.14,OMAN:.07}[zone]||.07;
    engineOsc.frequency.setTargetAtTime(p,t,1.5);
    engineGn.gain.setTargetAtTime(v,t,1.5);
  } catch(e){}
}

// ── Screen shake ──────────────────────────────────────────────────────────────
let shake=null, shakeLastMs=0;
function startShake(type,amp) {
  if (shake && shake.amp>=amp && shake.t<shake.dur*.6) return;
  shake={type,t:0,dur:type==='snap'?.14:type==='roll'?.72:.38,amp};
  shakeLastMs=Date.now();
}
function calcShake() {
  if (!shake) return [0,0];
  const dt=Math.min((Date.now()-shakeLastMs)/1000,.05);
  shakeLastMs=Date.now(); shake.t+=dt;
  if (shake.t>=shake.dur) { shake=null; return [0,0]; }
  const p=shake.t/shake.dur;
  if (shake.type==='snap') {
    const e=Math.pow(1-p,2.5);
    return [Math.sin(shake.t*280)*shake.amp*e, Math.cos(shake.t*260)*shake.amp*.5*e];
  } else if (shake.type==='roll') {
    const e=Math.sin(p*Math.PI);
    return [Math.sin(shake.t*38)*shake.amp*e, Math.sin(shake.t*29+1.1)*shake.amp*.6*e];
  } else {
    const e=Math.pow(1-p,1.2), f=55+(1-p)*80;
    return [Math.sin(shake.t*f)*shake.amp*e, -Math.abs(Math.sin(shake.t*f*.7))*shake.amp*.7*e];
  }
}

// ── Oil ticker ────────────────────────────────────────────────────────────────
const OIL_BASE=82, TICKER_GOAL=10;
let oilPrice,oilTarget,tickerItems;
const HEADLINES=[
  'Brent crude: $OIL/bbl','IRGC patrol near Qeshm Island',
  'US 5th Fleet on high alert','Hormuz — 21% of global oil transits',
  "Lloyd's raises war-risk premiums",'WTI crude: $OIL/bbl',
  'TSS traffic scheme in effect','IRGCN exercises ongoing',
  'Shipping war-risk up 40%','Gulf oil flow: 18-21m bbl/day',
];
function initTicker() {
  oilPrice=OIL_BASE; oilTarget=OIL_BASE;
  tickerItems=HEADLINES.map((h,i)=>({text:h,x:W+i*360,w:0}));
}
function oilShock(d) { oilTarget=Math.min(oilTarget+d*rnd(.2,.35),190); }
function oilCalm(a)  { oilTarget=Math.max(OIL_BASE,oilTarget-a); }
function updateTicker(dt) {
  oilPrice+=(oilTarget-oilPrice)*Math.min(dt*1.4,1);
  oilTarget+=(OIL_BASE-oilTarget)*dt*.08;
  const spd=58+(oilPrice-OIL_BASE)*.4;
  for (const item of tickerItems) {
    item.x-=spd*dt;
    if (item.x<-(item.w||400)) {
      item.x=Math.max(...tickerItems.map(t=>t.x))+360;
      item.text=HEADLINES[rndI(0,HEADLINES.length)]; item.w=0;
    }
  }
}

// ── Persistent crossings ──────────────────────────────────────────────────────
let crossings=0;
try { crossings=+(localStorage.getItem('hCrossings')||0); } catch(e){}
function saveCrossings() { try{localStorage.setItem('hCrossings',crossings);}catch(e){} }

// ── Game state ────────────────────────────────────────────────────────────────
let gs='TITLE', titleT=0;
let scrollX,score,hull,wave,waveTimer,spawnTimer,gTime;
let hitFlash,muzzleFlash,finalScore,aimIndicator;
let zoneCurrent,zonePrev,zoneBannerText,zoneBannerLife,chokeDone,salvoDone;
let player,enemies,bullets,cannonShells,exps,pickups,wakes,fireParticles;
let touchY=null,touchStartX=0,touchStartY=0,lastTap=0,justFlared=false;
let mouseX=0,mouseY=0,keys={};

function newGame() {
  PL_W=68; PL_H=20; PL_VERT=125;
  scrollX=0; score=0; hull=100; wave=1;
  waveTimer=0; spawnTimer=2; gTime=0; hitFlash=0; muzzleFlash=0; finalScore=0;
  aimIndicator=null; shake=null;
  zoneCurrent='GULF'; zonePrev='GULF'; zoneBannerText=''; zoneBannerLife=0;
  chokeDone=false; salvoDone=false;
  enemies=[]; bullets=[]; cannonShells=[]; exps=[];
  pickups=[]; wakes=[]; fireParticles=[];
  player={wx:W*.25,y:H*.65,flares:3,escort:0,iframes:0,cannonCool:0};
  touchY=H*.65;
  initTicker();
  gs='PLAY';
  startEngine();
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if (e.code==='Space') { e.preventDefault(); if(gs!=='PLAY') newGame(); }
  if (e.code==='KeyF' && gs==='PLAY') fireFlare();
  if ((e.code==='Enter'||e.code==='KeyX') && gs==='PLAY') fireCannon(mouseX,mouseY);
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });
document.addEventListener('mousemove', e=>{ mouseX=e.clientX; mouseY=e.clientY; });
document.addEventListener('click', e=>{
  if (gs!=='PLAY') { newGame(); return; }
  fireCannon(e.clientX,e.clientY);
});
C.addEventListener('touchstart', e=>{
  e.preventDefault();
  if (gs!=='PLAY') { newGame(); return; }
  const now=Date.now();
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
  touchY=e.touches[0].clientY; justFlared=false;
  if (now-lastTap<280) { fireFlare(); justFlared=true; }
  lastTap=now;
},{passive:false});
C.addEventListener('touchmove', e=>{
  e.preventDefault();
  if (gs==='PLAY') touchY=e.touches[0].clientY;
},{passive:false});
C.addEventListener('touchend', e=>{
  e.preventDefault();
  if (gs!=='PLAY'||justFlared) return;
  const tx=e.changedTouches[0].clientX, ty=e.changedTouches[0].clientY;
  if (Math.hypot(tx-touchStartX,ty-touchStartY)<24) fireCannon(tx,ty);
},{passive:false});

// ── Actions ───────────────────────────────────────────────────────────────────
function fireFlare() {
  if (player.flares<=0) return;
  player.flares--; sndFlare(); hitFlash=.25;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if((e.type==='missile'||e.type==='drone')&&Math.abs(e.wx-player.wx)<420){
      boom(e.wx,e.y,.65); score+=30; enemies.splice(i,1);
    }
  }
}
function fireCannon(sx,sy) {
  if (player.cannonCool>0) return;
  const dx=(sx+scrollX)-player.wx, dy=sy-player.y, d=Math.hypot(dx,dy)||1;
  cannonShells.push({wx:player.wx+PL_W/2+4,y:player.y,vx:dx/d*520,vy:dy/d*520,dist:0,maxDist:580});
  player.cannonCool=.65; muzzleFlash=.14; sndCannon();
  aimIndicator={sx,sy,life:.55};
}
function boom(wx,y,sc=1) {
  const big=sc>=1; sndBoom(big);
  startShake(big?'roll':'snap',big?9*sc:4*sc);
  const e={wx,y,r:5,a:1,sc,pct:[],debris:[],smoke:[]};
  for(let i=0;i<(big?22:12);i++){
    const spd=rnd(2.5,8.5)*sc,ang=rnd(0,Math.PI*2);
    e.pct.push({x:0,y:0,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,l:1,col:Math.random()<.5?0:1});
  }
  for(let i=0;i<(big?10:5);i++){
    const spd=rnd(1.5,5)*sc,ang=rnd(0,Math.PI*2);
    e.debris.push({x:0,y:0,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,len:rnd(4,10)*sc,ang,l:1});
  }
  for(let i=0;i<(big?8:4);i++){
    e.smoke.push({x:rnd(-6,6)*sc,y:rnd(-6,6)*sc,vx:rnd(-.6,.6)*sc,vy:rnd(-1.8,-.4)*sc,r:rnd(6,12)*sc,l:.85});
  }
  exps.push(e);
}

// ── Spawning ──────────────────────────────────────────────────────────────────
function mkEnemy(type,wx,y) {
  const e={type,wx,y,timer:0};
  if(type==='speedboat'){e.vx=rnd(-45,-90);e.shootT=rnd(1.5,3.5);e.w=22;e.h=9;}
  else if(type==='drone'){e.vx=rnd(-30,-55);e.vy=0;e.w=18;e.h=18;}
  else if(type==='mine'){e.vx=0;e.vy=0;e.w=20;e.h=20;}
  else{e.vx=rnd(-185,-255);e.vy=rnd(25,55);e.w=28;e.h=8;}
  enemies.push(e);
}
function spawnWave() {
  const fwx=player.wx+W*.78+rnd(80,320);
  if(fwx>WORLD_W-700) return;
  const zone=getZone(fwx); if(zone==='CHOKE') return;
  const cfg={
    GULF: {pool:['speedboat','speedboat','mine'],n:[1,3],pu:.50},
    STRAIT:{pool:['speedboat','drone','mine','missile'],n:[2,5],pu:.35},
    OMAN: {pool:['speedboat','drone'],n:[1,3],pu:.45},
  }[zone]||{pool:['speedboat'],n:[1,2],pu:.3};
  for(let i=0;i<rndI(cfg.n[0],cfg.n[1]+1);i++){
    const wx=fwx+i*rnd(90,220);
    const iY=coastY(IRAN_PTS,wx),oY=coastY(OMAN_PTS,wx);
    const type=cfg.pool[rndI(0,cfg.pool.length)];
    const y=type==='mine'?rnd(iY+35,oY-35):rnd(iY+12,iY+H*.18);
    mkEnemy(type,wx,Math.max(iY+12,Math.min(oY-12,y)));
  }
  if(Math.random()<cfg.pu){
    const px=fwx+120,iY=coastY(IRAN_PTS,px),oY=coastY(OMAN_PTS,px);
    pickups.push({wx:px,y:rnd(iY+45,oY-45),type:['repair','flare','escort'][rndI(0,3)],pulse:0});
  }
}
function spawnChokeSwarm() {
  const bwx=player.wx+W*.6;
  for(let i=0;i<5;i++){
    const wx=bwx+i*rnd(110,190);
    mkEnemy('speedboat',wx,coastY(IRAN_PTS,wx)+rnd(8,30));
    mkEnemy('drone',wx+rnd(40,100),coastY(OMAN_PTS,wx)-rnd(8,35));
  }
  for(let i=0;i<2;i++){const wx=bwx+rnd(300,600);mkEnemy('missile',wx,coastY(IRAN_PTS,wx)+20);}
  const px=bwx+W*.8,iY=coastY(IRAN_PTS,px),oY=coastY(OMAN_PTS,px);
  pickups.push({wx:px,y:(iY+oY)/2,type:'repair',pulse:0});
}
function spawnFinalSalvo() {
  const bwx=player.wx+W*.85;
  for(let i=0;i<4;i++){const wx=bwx+i*rnd(180,300);mkEnemy('missile',wx,coastY(IRAN_PTS,wx)+15);}
}

// ── Update ────────────────────────────────────────────────────────────────────
let prevT=0;
function update(ts) {
  const dt=Math.min((ts-prevT)/1000,.05); prevT=ts;
  if (gs!=='PLAY') return;

  gTime+=dt; score+=dt*12;
  if(hitFlash>0)    hitFlash-=dt*3;
  if(muzzleFlash>0) muzzleFlash-=dt*8;
  if(player.cannonCool>0) player.cannonCool-=dt;
  if(aimIndicator){aimIndicator.life-=dt*2.2;if(aimIndicator.life<=0)aimIndicator=null;}

  scrollX+=(62+wave*4)*dt; player.wx=scrollX+W*.25;
  if(scrollX+W>=WORLD_W){
    finalScore=Math.round(score+hull*14);
    crossings++; saveCrossings(); stopEngine(); gs='WIN'; return;
  }

  // Player
  const iY=coastY(IRAN_PTS,player.wx),oY=coastY(OMAN_PTS,player.wx);
  let tgt=touchY!==null?touchY:player.y;
  if(keys['ArrowUp']||keys['KeyW'])   tgt-=5;
  if(keys['ArrowDown']||keys['KeyS']) tgt+=5;
  const ddy=tgt-player.y,step=PL_VERT*dt;
  player.y+=ddy>step?step:ddy<-step?-step:ddy;
  player.y=Math.max(iY+PL_H/2+4,Math.min(oY-PL_H/2-4,player.y));
  for(const isl of ISLANDS){
    if(Math.abs(player.wx-isl[0])<isl[2]+PL_W*.55&&Math.abs(player.y-isl[1]*H)<isl[3]*H+PL_H*.55)
      player.y=isl[1]*H+isl[3]*H+PL_H*.55+2;
  }
  if(player.iframes>0) player.iframes-=dt;
  if(player.escort>0)  player.escort-=dt;

  wakes.push({wx:player.wx-6,y:player.y,l:1});
  if(wakes.length>50) wakes.shift();
  wakes.forEach(w=>w.l-=dt*1.9);

  // Zone
  zonePrev=zoneCurrent; zoneCurrent=getZone(player.wx);
  if(zoneCurrent!==zonePrev){
    zoneBannerText={GULF:'PERSIAN GULF',STRAIT:'STRAIT OF HORMUZ',CHOKE:'⚠ HORMUZ CHOKEPOINT',OMAN:'GULF OF OMAN'}[zoneCurrent]||'';
    zoneBannerLife=2.8;
    if(zoneCurrent==='STRAIT') oilShock(6);
    if(zoneCurrent==='CHOKE')  oilShock(18);
    if(zoneCurrent==='OMAN')   oilCalm(8);
  }
  if(zoneBannerLife>0) zoneBannerLife-=dt;
  setEnginePitch(zoneCurrent);

  // Scripted
  if(!chokeDone&&player.wx>=Z_CHOKE_S+60){chokeDone=true;spawnChokeSwarm();startShake('roll',6);}
  if(!salvoDone&&player.wx>=Z_SALVO){salvoDone=true;spawnFinalSalvo();zoneBannerText='⚠ FINAL APPROACH — MISSILES INBOUND';zoneBannerLife=3.2;oilShock(22);}

  // Wave & spawn
  waveTimer+=dt; if(waveTimer>13){wave++;waveTimer=0;}
  spawnTimer-=dt;
  if(spawnTimer<=0){
    spawnWave();
    const iv={GULF:[4.5,7.5],STRAIT:[2.2,4.0],CHOKE:[8,12],OMAN:[4.0,6.5]}[zoneCurrent]||[3,5];
    spawnTimer=rnd(iv[0],iv[1]);
  }

  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i]; e.timer+=dt;
    if(e.wx-scrollX<-200){enemies.splice(i,1);continue;}
    if(e.type==='drone'){
      const dx=player.wx-e.wx,dy=player.y-e.y,d=Math.hypot(dx,dy)||1;
      e.wx+=dx/d*(80+wave*9)*dt; e.y+=dy/d*(80+wave*9)*dt;
    } else if(e.type==='missile'){
      e.vy=Math.max(-110,Math.min(110,e.vy*.97+(player.y-e.y)*.03*55));
      e.wx+=e.vx*dt; e.y+=e.vy*dt;
    } else if(e.type==='speedboat'){
      e.wx+=e.vx*dt; e.y+=Math.sin(e.timer*2.4)*38*dt;
      if((e.shootT-=dt)<=0){
        e.shootT=rnd(2,4.5);
        const dx=player.wx-e.wx,dy=player.y-e.y,d=Math.hypot(dx,dy)||1,spd=195+wave*14;
        bullets.push({wx:e.wx,y:e.y,vx:dx/d*spd,vy:dy/d*spd,foe:true});
      }
    }
    if(player.escort>0&&e.type!=='mine'){
      const dx=e.wx-player.wx;
      if(dx>0&&dx<360&&rnd(0,1)<dt*2.2){
        const d=Math.hypot(dx,e.y-player.y)||1;
        bullets.push({wx:player.wx+28,y:player.y-38,vx:dx/d*290,vy:(e.y-player.y)/d*290,foe:false});
      }
    }
    if(player.iframes<=0){
      const hw=((e.w||20)+PL_W)*.5-4,hh=((e.h||20)+PL_H)*.5-4;
      if(Math.abs(e.wx-player.wx)<hw&&Math.abs(e.y-player.y)<hh){
        const dmg=e.type==='missile'?35:e.type==='mine'?42:15;
        hull-=dmg; player.iframes=1.8; hitFlash=.8; oilShock(dmg);
        if(e.type==='missile') startShake('roll',11);
        else if(e.type==='mine') startShake('thud',14);
        else startShake('snap',7);
        sndHit(); boom(e.wx,e.y); enemies.splice(i,1);
        if(hull<=0){hull=0;finalScore=Math.round(score);stopEngine();gs='DEAD';return;}
        continue;
      }
    }
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.wx+=b.vx*dt; b.y+=b.vy*dt;
    const sx=b.wx-scrollX;
    if(sx<-50||sx>W+50||b.y<0||b.y>H){bullets.splice(i,1);continue;}
    if(!b.foe){
      let hit=false;
      for(let j=enemies.length-1;j>=0;j--){
        if(Math.abs(b.wx-enemies[j].wx)<22&&Math.abs(b.y-enemies[j].y)<20){
          boom(enemies[j].wx,enemies[j].y,.65);score+=55;enemies.splice(j,1);bullets.splice(i,1);hit=true;break;
        }
      }
      if(hit) continue;
    } else if(player.iframes<=0){
      if(Math.abs(b.wx-player.wx)<PL_W/2+5&&Math.abs(b.y-player.y)<PL_H/2+5){
        hull-=10;player.iframes=.7;hitFlash=.6;oilShock(10);startShake('snap',5);sndHit();
        boom(b.wx,b.y,.4);bullets.splice(i,1);
        if(hull<=0){hull=0;finalScore=Math.round(score);stopEngine();gs='DEAD';return;}
        continue;
      }
    }
  }

  // Cannon shells
  for(let i=cannonShells.length-1;i>=0;i--){
    const s=cannonShells[i];
    s.wx+=s.vx*dt;s.y+=s.vy*dt;s.dist+=Math.hypot(s.vx,s.vy)*dt;
    if(s.wx-scrollX<-40||s.wx-scrollX>W+40||s.y<0||s.y>H||s.dist>s.maxDist){
      if(s.dist>=s.maxDist) boom(s.wx,s.y,.4);
      cannonShells.splice(i,1);continue;
    }
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      if(Math.hypot(s.wx-enemies[j].wx,s.y-enemies[j].y)<(enemies[j].type==='mine'?18:16)){
        boom(enemies[j].wx,enemies[j].y,enemies[j].type==='missile'?1.1:.75);
        score+=enemies[j].type==='missile'?110:enemies[j].type==='mine'?90:70;
        enemies.splice(j,1);cannonShells.splice(i,1);hit=true;break;
      }
    }
    if(hit) continue;
  }

  // Pickups
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i]; p.pulse+=dt*3.2;
    if(p.wx-scrollX<-65){pickups.splice(i,1);continue;}
    if(Math.abs(p.wx-player.wx)<38&&Math.abs(p.y-player.y)<32){
      if(p.type==='repair'){hull=Math.min(hull+24,100);oilCalm(4);}
      else if(p.type==='flare') player.flares=Math.min(player.flares+2,6);
      else player.escort=13;
      sndPickup();score+=45;boom(p.wx,p.y,.35);pickups.splice(i,1);
    }
  }

  // Explosions
  for(let i=exps.length-1;i>=0;i--){
    const e=exps[i];
    e.r+=4*dt*60*.016;e.a-=.033;
    e.pct.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.l-=.028;});
    e.debris.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vx*=.91;d.vy*=.91;d.l-=.022;});
    e.smoke.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.r+=.9;s.l-=.018;});
    if(e.a<=0) exps.splice(i,1);
  }

  // Fire particles
  if(hull<=40&&rnd(0,1)<(hull<=15?.45:.18)){
    fireParticles.push({x:player.wx+rnd(-22,18),y:player.y+rnd(-8,8),
      vx:rnd(-.3,.3)*60,vy:rnd(-60,-100),r:rnd(3,7),l:1,smoke:Math.random()<.5});
  }
  for(let i=fireParticles.length-1;i>=0;i--){
    const p=fireParticles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy*=.97;p.l-=dt*(p.smoke?1.1:1.8);
    if(p.l<=0) fireParticles.splice(i,1);
  }

  updateTicker(dt);
}

function drawBg() {
  const zone=zoneCurrent||'GULF';
  const cols={GULF:['#091C38','#0C2548'],STRAIT:['#0F1830','#1A1830'],CHOKE:['#1A0E20','#240E18'],OMAN:['#091C30','#0C2238']};
  const [tc,bc]=cols[zone]||cols.GULF;
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,tc);g.addColorStop(1,bc);
  X.fillStyle=g;X.fillRect(0,0,W,H);
  if(zone==='CHOKE'||zone==='STRAIT'){
    const vg=X.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.9);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(140,10,10,${zone==='CHOKE'?.22:.10})`);
    X.fillStyle=vg;X.fillRect(0,0,W,H);
  }
  X.strokeStyle='rgba(0,140,255,.052)';X.lineWidth=.8;
  const gsp=72,ox=scrollX%gsp;
  for(let x=-ox;x<W;x+=gsp){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(let y=0;y<H;y+=gsp){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
  const n=Date.now()/1000;
  X.strokeStyle='rgba(60,160,255,.025)';X.lineWidth=1.5;
  for(let i=0;i<22;i++){
    const y=(i*H/22+n*5)%H;
    X.beginPath();X.moveTo(0,y+Math.sin(n*.6+i)*2.5);X.lineTo(W,y+Math.cos(n*.5+i*1.3)*2.5);X.stroke();
  }
  const iY=coastY(IRAN_PTS,player.wx),oY=coastY(OMAN_PTS,player.wx);
  X.setLineDash([18,14]);X.strokeStyle='rgba(255,215,80,.16)';X.lineWidth=1.2;
  X.beginPath();X.moveTo(0,iY+(oY-iY)*.62);X.lineTo(W,iY+(oY-iY)*.62);X.stroke();
  X.setLineDash([]);
  const lbl={GULF:'PERSIAN GULF',STRAIT:'STRAIT OF HORMUZ',CHOKE:'HORMUZ CHOKEPOINT',OMAN:'GULF OF OMAN'}[zone]||'';
  X.fillStyle=zone==='CHOKE'?'rgba(255,80,60,.13)':'rgba(255,215,80,.10)';
  X.font=`${Math.min(H*.09,26)}px Courier New`;
  X.textAlign='center';X.textBaseline='middle';X.fillText(lbl,W/2,H/2);
  const prog=player.wx/WORLD_W;
  X.fillStyle='rgba(100,180,255,.35)';X.font=`${Math.min(H*.026,10)}px Courier New`;
  X.textAlign='right';X.fillText(`${(26.5-prog).toFixed(2)}°N  ${(56+prog*2).toFixed(2)}°E`,W-8,H-42);
  X.textAlign='left';X.textBaseline='alphabetic';
}

function drawCoast() {
  const N=100,x0=scrollX-120,x1=scrollX+W+120;
  function fill(pts,top){
    X.beginPath();
    for(let i=0;i<=N;i++){const wx=x0+(x1-x0)*i/N,sx=wx-scrollX,sy=coastY(pts,wx);i?X.lineTo(sx,sy):X.moveTo(sx,sy);}
    top?(X.lineTo(W+120,0),X.lineTo(-120,0)):(X.lineTo(W+120,H),X.lineTo(-120,H));
    X.closePath();
  }
  function stroke(pts){
    X.beginPath();
    for(let i=0;i<=N;i++){const wx=x0+(x1-x0)*i/N,sx=wx-scrollX,sy=coastY(pts,wx);i?X.lineTo(sx,sy):X.moveTo(sx,sy);}
    X.stroke();
  }
  fill(IRAN_PTS,true);
  const gI=X.createLinearGradient(0,0,0,H*.28);gI.addColorStop(0,'#A0876A');gI.addColorStop(1,'#7C6548');
  X.fillStyle=gI;X.fill();X.strokeStyle='#D4B87C';X.lineWidth=2.5;stroke(IRAN_PTS);
  fill(OMAN_PTS,false);
  const gO=X.createLinearGradient(0,H*.68,0,H);gO.addColorStop(0,'#7C6548');gO.addColorStop(1,'#A0876A');
  X.fillStyle=gO;X.fill();X.strokeStyle='#D4B87C';X.lineWidth=2.5;stroke(OMAN_PTS);
  X.font=`bold ${Math.min(H*.034,13)}px Courier New`;X.fillStyle='rgba(255,228,160,.78)';
  X.fillText('IRAN',8,coastY(IRAN_PTS,scrollX+90)-10);
  X.fillText('OMAN / UAE',8,coastY(OMAN_PTS,scrollX+90)+17);
}

function drawEnemies(){
  const n=Date.now()/1000;
  for(const e of enemies){

    X.save();X.translate(sx,e.y);
    if(e.type==='speedboat'){
      X.fillStyle='#C0392B';X.beginPath();X.moveTo(-13,0);X.lineTo(13,-5.5);X.lineTo(13,5.5);X.closePath();X.fill();
      X.fillStyle='#1A6B15';X.fillRect(2,-13,9,7);X.fillStyle='#FFF';X.fillRect(2,-13,9,2);X.fillStyle='#C0392B';X.fillRect(2,-11,9,2);
      X.fillStyle='rgba(255,255,255,.22)';X.beginPath();X.ellipse(-16,0,8,2.5,0,0,Math.PI*2);X.fill();
    } else if(e.type==='drone'){
      X.save();X.rotate(e.timer*2.2);X.fillStyle='#E74C3C';X.fillRect(-9,-2.5,18,5);X.fillRect(-2.5,-9,5,18);
      for(let k=0;k<4;k++){X.save();X.rotate(k*Math.PI/2);X.fillStyle='rgba(200,50,50,.6)';X.beginPath();X.ellipse(10,0,8,2.5,0,0,Math.PI*2);X.fill();X.restore();}
      X.restore();
      X.beginPath();X.arc(0,0,5,0,Math.PI*2);X.fillStyle='#F39C12';X.fill();
      if((n*5|0)%2){X.beginPath();X.arc(0,0,2.5,0,Math.PI*2);X.fillStyle='#FFF';X.fill();}
    } else if(e.type==='mine'){
      X.fillStyle='#717D7E';X.beginPath();X.arc(0,0,10,0,Math.PI*2);X.fill();
      X.strokeStyle='#AAB7B8';X.lineWidth=1.5;X.stroke();
      for(let k=0;k<8;k++){const a=k*Math.PI/4;X.beginPath();X.moveTo(Math.cos(a)*10,Math.sin(a)*10);X.lineTo(Math.cos(a)*17,Math.sin(a)*17);X.stroke();X.beginPath();X.arc(Math.cos(a)*17,Math.sin(a)*17,2.5,0,Math.PI*2);X.fillStyle='#E74C3C';X.fill();}
    } else {
      X.fillStyle='#E67E22';X.beginPath();X.moveTo(15,0);X.lineTo(-12,-4.5);X.lineTo(-14,0);X.lineTo(-12,4.5);X.closePath();X.fill();
      X.fillStyle='#D35400';X.beginPath();X.moveTo(-12,-4.5);X.lineTo(-20,-10);X.lineTo(-14,0);X.closePath();X.fill();
      X.beginPath();X.moveTo(-12,4.5);X.lineTo(-20,10);X.lineTo(-14,0);X.closePath();X.fill();

  X.textAlign='left';X.fillText('PERSIAN GULF',pad+2,H-17);
  X.textAlign='center';X.fillText('STRAIT OF HORMUZ',W/2,H-17);
  X.textAlign='right';X.fillText('GULF OF OMAN',W-pad,H-17);

  const ssX=player.wx-scrollX,cf=player.cannonCool>0?player.cannonCool/.65:0;
  X.strokeStyle='rgba(255,255,100,.18)';X.lineWidth=3.5;X.beginPath();X.arc(ssX,player.y,24,-Math.PI/2,Math.PI*3/2);X.stroke();
  if(cf>0){X.strokeStyle=`rgba(220,60,60,${.55+cf*.3})`;X.lineWidth=3.5;X.beginPath();X.arc(ssX,player.y,24,-Math.PI/2,-Math.PI/2+cf*Math.PI*2);X.stroke();}
  else{const rp=.5+Math.sin(Date.now()/180)*.5;X.strokeStyle=`rgba(255,240,60,${rp*.7})`;X.lineWidth=3.5;X.beginPath();X.arc(ssX,player.y,24,-Math.PI/2,Math.PI*3/2);X.stroke();}

  X.fillStyle='#F39C12';X.textAlign='left';X.font=`${fs(.27)}px Courier New`;
  let fs2='FLARES ';for(let i=0;i<6;i++) fs2+=i<player.flares?'◆':'◇';X.fillText(fs2,pad,H-5);
  if(player.escort>0){X.fillStyle='#3498DB';X.textAlign='right';X.font=`${fs(.26)}px Courier New`;X.fillText(`⚓ ESCORT ${player.escort.toFixed(1)}s`,W-pad,H-5);}

  if(gTime<6){
    const a=Math.max(0,1-gTime/5.5);
    X.fillStyle=`rgba(255,255,255,${a*.7})`;X.font=`${fs(.26)}px Courier New`;
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('TAP TO SHOOT  •  DRAG TO STEER  •  DOUBLE-TAP = FLARES',W/2,H/2+45);
  }

  if(zoneBannerLife>0){
    const t=zoneBannerLife/2.8,a=t>.85?(1-t)/.15:t<.25?t/.25:1;
    const isAlert=zoneBannerText.includes('CHOKE')||zoneBannerText.includes('FINAL');
    const bfs=Math.min(W*.075,28);
    X.save();X.textAlign='center';X.textBaseline='middle';X.font=`bold ${bfs}px Courier New`;
    X.shadowColor=isAlert?'#FF0000':'#FFC000';X.shadowBlur=18*a;
    X.fillStyle=isAlert?`rgba(200,30,30,${a*.82})`:`rgba(255,210,60,${a*.90})`;
    X.fillText(zoneBannerText,W/2,H*.5-2);X.shadowBlur=0;X.restore();
  }

  if(hitFlash>0){X.fillStyle=`rgba(220,30,30,${hitFlash*.28})`;X.fillRect(0,0,W,H);}
  X.textAlign='left';X.textBaseline='alphabetic';
}

function drawTicker(){
  const ty=44,th=16;
  X.fillStyle='rgba(8,18,8,.92)';X.fillRect(0,ty,W,th);
  X.strokeStyle='rgba(180,140,0,.4)';X.lineWidth=.8;
  X.beginPath();X.moveTo(0,ty);X.lineTo(W,ty);X.stroke();
  X.beginPath();X.moveTo(0,ty+th);X.lineTo(W,ty+th);X.stroke();
  X.save();X.rect(0,ty,W,th);X.clip();
  X.font=`bold ${Math.min(th*.72,11)}px Courier New`;X.textBaseline='middle';
  const ratio=Math.min((oilPrice-OIL_BASE)/(190-OIL_BASE),1);
  for(const item of tickerItems){
    const label=item.text.replace('$OIL',`$${oilPrice.toFixed(2)}`);
    if(!item.w) item.w=X.measureText(label+'   ◆   ').width;
    const isPx=item.text.includes('$OIL');
    X.fillStyle=isPx?(ratio<.4?`rgb(${(ratio/.4*200)|0},${(200-ratio/.4*60)|0},40)`:`rgb(220,${(200-(ratio-.4)/.6*160)|0},20)`):'rgba(140,200,120,.75)';
    X.fillText(label+'   ◆   ',item.x,ty+th/2);
    if(isPx){
      X.fillStyle=oilPrice>OIL_BASE+2?'#E74C3C':oilPrice<OIL_BASE-1?'#2ECC71':'#AAA';
      X.fillText(oilPrice>OIL_BASE+2?' ▲':oilPrice<OIL_BASE-1?' ▼':' ─',item.x+X.measureText(label).width,ty+th/2);
    }
  }
  X.restore();X.textBaseline='alphabetic';
}

function drawTitle(){
  titleT+=.014;const n=Date.now()/1000;
  const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#020A18');g.addColorStop(1,'#051228');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  X.strokeStyle='rgba(0,80,180,.06)';X.lineWidth=2;
  for(let i=0;i<24;i++){const y=(i*H/24+n*14)%H;X.beginPath();X.moveTo(0,y+Math.sin(n*.7+i)*3);X.lineTo(W,y+Math.cos(n*.55+i*1.2)*3);X.stroke();}
  X.save();X.translate(W/2-60,H*.78);
  X.fillStyle='rgba(20,40,70,.85)';X.beginPath();X.moveTo(130,0);X.lineTo(118,-17);X.lineTo(-130,-17);X.lineTo(-130,17);X.lineTo(118,17);X.closePath();X.fill();
  X.fillStyle='rgba(50,80,110,.7)';for(let i=0;i<5;i++) X.fillRect(-90+i*33,-17,25,12);X.restore();
  X.textAlign='center';X.textBaseline='middle';
  X.shadowColor='#C0392B';X.shadowBlur=28;X.fillStyle='#E74C3C';
  X.font=`bold ${Math.min(W*.115,54)}px Courier New`;X.fillText('HORMUZ RUN',W/2,H*.27);X.shadowBlur=0;
  X.fillStyle='#F1C40F';X.font=`${Math.min(W*.044,16)}px Courier New`;
  X.fillText("Navigate your oil tanker through the world's",W/2,H*.40);
  X.fillText("most dangerous shipping lane",W/2,H*.40+21);
  X.fillStyle='rgba(200,200,200,.72)';X.font=`${Math.min(W*.033,12)}px Courier New`;
  X.fillText('⛵ Speedboats  ✈ Drones  🚀 Missiles  💣 Mines',W/2,H*.51);
  X.fillText('Pick up: ⚕ Repairs  ✦ Flares  ⚓ USN Escort',W/2,H*.57);
  X.fillText('TAP to shoot  •  DRAG to steer  •  DOUBLE-TAP for flares',W/2,H*.63);
  const p=.72+Math.sin(titleT*5)*.28;
  X.fillStyle=`rgba(241,196,15,${p})`;X.font=`bold ${Math.min(W*.055,21)}px Courier New`;
  X.fillText('▶  TAP TO BEGIN  ◀',W/2,H*.72);
  X.fillStyle='rgba(120,160,200,.5)';X.font=`${Math.min(W*.027,10)}px Courier New`;
  X.fillText('Strait of Hormuz — 21% of global oil supply',W/2,H*.92);
  if(crossings>0){
    X.fillStyle=crossings>=TICKER_GOAL?'rgba(100,230,100,.8)':'rgba(100,200,130,.65)';
    X.fillText(`Successful crossings: ${crossings} / ${TICKER_GOAL}`,W/2,H*.86);
  }
  X.textAlign='left';X.textBaseline='alphabetic';
}

function drawEnd(win){
  X.fillStyle='rgba(0,0,0,.82)';X.fillRect(0,0,W,H);
  X.textAlign='center';X.textBaseline='middle';const fz=Math.min(W*.1,42);
  if(win){
    X.shadowColor='#2ECC71';X.shadowBlur=22;X.fillStyle='#2ECC71';X.font=`bold ${fz}px Courier New`;
    X.fillText('CARGO DELIVERED!',W/2,H*.25);X.shadowBlur=0;
    X.fillStyle='#ECF0F1';X.font=`${Math.min(W*.042,16)}px Courier New`;
    X.fillText('You made it through the Strait of Hormuz!',W/2,H*.38);
    X.fillText('The oil flows. The markets hold.',W/2,H*.45);
  } else {
    X.shadowColor='#E74C3C';X.shadowBlur=22;X.fillStyle='#E74C3C';X.font=`bold ${fz}px Courier New`;
    X.fillText('TANKER SUNK',W/2,H*.25);X.shadowBlur=0;
    X.fillStyle='#ECF0F1';X.font=`${Math.min(W*.042,16)}px Courier New`;
    X.fillText('Hull integrity lost. Oil spill in progress.',W/2,H*.38);
    X.fillText("Lloyd's of London is not happy.",W/2,H*.45);
  }
  X.fillStyle='#F1C40F';X.font=`bold ${Math.min(W*.065,28)}px Courier New`;X.fillText(`SCORE: ${finalScore}`,W/2,H*.55);
  X.fillStyle=crossings>=TICKER_GOAL?'#2ECC71':'rgba(100,210,130,.9)';
  X.font=`bold ${Math.min(W*.052,22)}px Courier New`;X.fillText(`CROSSINGS: ${crossings} / ${TICKER_GOAL}`,W/2,H*.63);
  if(crossings>=TICKER_GOAL){X.fillStyle='#F1C40F';X.font=`${Math.min(W*.036,14)}px Courier New`;X.fillText('★  TARGET ACHIEVED  ★',W/2,H*.69);}
  const or=Math.min((oilPrice-OIL_BASE)/(190-OIL_BASE),1);
  X.fillStyle=or<.35?'#2ECC71':or<.65?'#F39C12':'#E74C3C';
  X.font=`${Math.min(W*.038,14)}px Courier New`;X.fillText(`OIL CLOSED AT $${oilPrice.toFixed(2)}/bbl`,W/2,H*.76);
  const pa=.65+Math.sin(Date.now()/380)*.35;
  X.fillStyle=`rgba(255,255,255,${pa})`;X.font=`${Math.min(W*.05,19)}px Courier New`;
  X.fillText('TAP TO PLAY AGAIN',W/2,H*.86);
  X.textAlign='left';X.textBaseline='alphabetic';
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(ts) {
  update(ts);
  if (gs==='TITLE') {
    drawTitle();
  } else if (gs==='PLAY') {
    const [sx0,sy0]=calcShake();
    X.save();X.translate(sx0,sy0);
    drawBg();drawCoast();drawIslands();drawWakes();
    drawFireParticles();drawExplosions();drawPickups();
    drawBullets();drawCannonShells();drawAimIndicator();
    drawEnemies();drawPlayer();
    X.restore();
    drawHUD();drawTicker();
  } else if (gs==='DEAD') {
    drawBg();drawCoast();drawIslands();drawEnd(false);
  } else if (gs==='WIN') {
    drawBg();drawCoast();drawIslands();drawEnd(true);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{prevT=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
